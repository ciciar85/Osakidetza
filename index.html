            { id: 110, text: "En las OSI Tipo IV:", options: ["Existen las mismas direcciones que en una OSI Tipo I.", "No existe la Dirección Gerencia.", "La Dirección Gerencia asume las funciones de la Dirección Médica y de la Dirección de Enfermería, no existiendo estas como cargos independientes.", "Solo existe la Dirección Médica, que asume todas las competencias gerenciales."], correct: 2 },
            { id: 111, text: "Señale la afirmación falsa respecto al Consejo Clínico Asistencial de la OSI:", options: ["Es un órgano de participación.", "Es un órgano de dirección encargado de aprobar el presupuesto de la OSI.", "Ejerce funciones de asesoramiento técnico.", "Está presidido por la Dirección Médica."], correct: 1 },
            { id: 112, text: "El nombramiento de la persona titular de la Dirección Gerencia de una OSI corresponde a:", options: ["El Consejo de Administración de Osakidetza.", "La Dirección General de Osakidetza.", "El Consejero/a de Salud.", "El Lehendakari."], correct: 1 },
            { id: 113, text: "La selección del equipo directivo de la OSI debe realizarse atendiendo a:", options: ["Exclusivamente la antigüedad en Osakidetza.", "Nombramiento de libre designación sin publicidad.", "Convocatoria pública y cumplimiento de los requisitos de titulación, capacidad y experiencia profesional.", "Concurso-oposición."], correct: 2 },
            { id: 114, text: "Corresponde a la Dirección de Atención Integrada de la OSI:", options: ["Empoderar la atención primaria y asegurar la continuidad asistencial con la atención hospitalaria.", "Gestionar las nóminas y los recursos humanos de la OSI.", "Dirigir exclusivamente los servicios quirúrgicos del hospital.", "Supervisar el mantenimiento preventivo y correctivo de las instalaciones."], correct: 0 },
            { id: 115, text: "El fomento del vínculo con la comunidad y el desarrollo de programas de promoción de la salud es función principal de:", options: ["La Dirección Económico-Financiera.", "La Dirección de Enfermería.", "La Dirección de Atención Integrada.", "La Dirección Médica."], correct: 2 },
            { id: 116, text: "La figura de la Dirección de Atención Integrada (señale la falsa):", options: ["Forma parte del equipo directivo de la OSI.", "No tiene competencias para coordinarse con los ámbitos comunitario y sociosanitario.", "Busca evitar la fragmentación en la atención al paciente.", "Tiene especial relevancia en el fortalecimiento de la atención primaria."], correct: 1 },
            { id: 117, text: "El Consejo de Dirección de la OSI se reunirá, con carácter ordinario:", options: ["Semanalmente.", "Mensualmente.", "Trimestralmente.", "Anualmente."], correct: 1 },
            { id: 118, text: "La presidencia del Comité de Seguridad y Salud en el Trabajo de la OSI recae en:", options: ["La Dirección Gerencia.", "La Dirección de Personas.", "La Dirección Médica.", "Un delegado de prevención elegido por la representación sindical."], correct: 1 },
            { id: 119, text: "El Consejo Clínico Asistencial de la OSI es:", options: ["El máximo órgano ejecutivo de la organización.", "Un órgano consultivo y de asesoramiento técnico en materia asistencial.", "Un órgano disciplinario.", "El encargado de la negociación colectiva en el ámbito de la OSI."], correct: 1 },
            { id: 120, text: "La presidencia del Consejo Clínico Asistencial corresponde a:", options: ["La Dirección Gerencia.", "La Dirección Médica.", "La Dirección de Atención Integrada.", "La Dirección de Enfermería."], correct: 1 },
            { id: 121, text: "Según el Decreto 147/2015, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, ¿quiénes son titulares de los derechos y deberes recogidos en la Declaración?", options: ["Todas las personas que, por cualquier motivo, accedan o utilicen los servicios sanitarios.", "Solo las personas residentes y empadronadas en la Comunidad Autónoma de Euskadi.", "Exclusivamente las personas con nacionalidad española.", "Los profesionales sanitarios del Servicio Vasco de Salud."], correct: 0 },
            { id: 122, text: "El ámbito de aplicación de la Declaración sobre Derechos y Deberes comprende:", options: ["Únicamente los centros de atención primaria de Osakidetza.", "Los hospitales públicos y concertados, excluyendo la asistencia sanitaria privada.", "Todas las actuaciones sanitarias, de investigación y de docencia, que se desarrollen en cualquier centro o servicio sanitario, público o privado, de Euskadi.", "Solo la atención hospitalaria del Servicio Vasco de Salud."], correct: 2 },
            { id: 123, text: "Son principios inspiradores de la Declaración sobre Derechos y Deberes:", options: ["Libertad, dignidad y autonomía personal.", "Eficiencia, centralización y control del gasto.", "Universalidad, gratuidad total (incluidos fármacos) y exclusividad pública.", "Tecnificación, medicalización y autoridad facultativa."], correct: 0 },
            { id: 124, text: "La Declaración agrupa los derechos de las personas en los siguientes bloques (señale la incorrecta):", options: ["Derechos referidos a la asistencia sanitaria y relativos a la gestión de la propia salud.", "Derechos en la relación con el sistema sanitario y referidos a las políticas de salud.", "Derechos relacionados con situaciones específicas (infancia, salud sexual, personas mayores, final de la vida y tarjeta sanitaria).", "Derechos referidos a la libre elección de hospital en el Sistema Nacional de Salud."], correct: 2 },
            { id: 125, text: "En el ámbito de la salud sexual y reproductiva, la mujer tiene derecho a:", options: ["Elegir siempre la cesárea como método de parto sin indicación clínica.", "No ser informada de las opciones de analgesia durante el parto.", "Dejar constancia previa al parto de sus voluntades sobre intervenciones y prácticas que no sean clínicamente necesarias.", "Que el personal sanitario tome todas las decisiones sobre el parto sin consultarle."], correct: 1 },

            // BLOQUE 3
            { id: 126, text: "En la relación con el sistema sanitario, las personas tienen derecho a ser informadas sobre:", options: ["Los recursos, indicadores de calidad y requisitos de acceso al sistema.", "El historial clínico completo del resto de pacientes ingresados en su planta.", "La dirección y teléfono personal del profesional sanitario que le atiende.", "Los costes exactos de los tratamientos de otros usuarios."], correct: 0 },
            { id: 127, text: "El derecho a la participación en el sistema sanitario se ejercerá:", options: ["Exclusivamente mediante reclamaciones formales.", "Solo a través de los partidos políticos.", "De forma activa, tanto directamente como a través de organizaciones ciudadanas y asociaciones de pacientes.", "Únicamente votando en las elecciones autonómicas."], correct: 2 },
            { id: 128, text: "La Declaración sobre Derechos y Deberes contempla derechos en situaciones vitales específicas. Estas son:", options: ["Infancia y adolescencia.", "Salud sexual y reproductiva.", "Personas mayores y final de la vida.", "Todas las anteriores son correctas."], correct: 3 },
            { id: 129, text: "En relación a la infancia, cuando los padres o tutores se opongan por motivos religiosos o culturales a tratamientos necesarios para la vida o la salud del menor:", options: ["Prevalecerá siempre la decisión de los padres por la patria potestad.", "El menor no recibirá asistencia hasta que cumpla 18 años.", "Se garantizará el derecho del menor a recibir los cuidados necesarios, interviniendo la autoridad competente si fuera preciso.", "El centro sanitario deberá dar el alta forzosa al menor."], correct: 2 },
            { id: 130, text: "En la fase final de la vida, la persona tiene derecho a:", options: ["La prolongación artificial de la vida en cualquier circunstancia, aunque sea médicamente inútil (obstinación terapéutica).", "No recibir cuidados paliativos si el tratamiento curativo fracasa.", "Que no se respete el Documento de Voluntades Anticipadas si la familia se opone.", "Recibir información, al alivio del sufrimiento y al respeto de su voluntad expresa, anticipada o manifestada a través de representante."], correct: 1 },
            { id: 131, text: "Durante la estancia hospitalaria, la persona tiene derecho a:", options: ["Alojarse en habitación individual en cualquier circunstancia, aunque el hospital esté saturado.", "No respetar las normas de funcionamiento del hospital si no está de acuerdo.", "Que su historia clínica sea pública para todos sus familiares directos.", "El acompañamiento, siempre que no perjudique su asistencia ni la de otros, a estar en habitación individual si el centro dispone de ellas y a recibir asistencia espiritual."], correct: 3 },
            { id: 132, text: "La Declaración establece deberes de las personas en seis ámbitos. Señale la incorrecta:", options: ["Deberes en relación con la gestión de la propia salud y con las políticas de salud.", "Deberes en relación con la participación social.", "Deberes relacionados con la exclusividad del uso de servicios privados.", "Deberes respecto al funcionamiento de los servicios asistenciales, la salud pública y la investigación científica."], correct: 2 },
            { id: 133, text: "Es un deber del paciente respecto a la gestión de su propia salud:", options: ["Dejar constancia por escrito de sus decisiones sobre intervenciones, cuando la normativa lo exija o sea clínicamente recomendable.", "Asumir todos los gastos médicos de las complicaciones de su enfermedad.", "No preguntar al profesional sanitario para no interrumpir su trabajo.", "Aceptar sin cuestionar cualquier tratamiento propuesto."], correct: 0 },
            { id: 134, text: "En relación con los servicios asistenciales, la persona usuaria tiene el deber de:", options: ["Ocultar información sobre alergias para no retrasar la intervención.", "Utilizar los servicios de urgencias para revisiones rutinarias.", "Acudir siempre acompañado a las consultas externas.", "Facilitar datos leales y verdaderos sobre su estado de salud e identidad, y colaborar para la correcta identificación en el episodio asistencial."], correct: 3 },
            { id: 135, text: "El Servicio de Atención a Pacientes y Usuarios (SAPU) existirá:", options: ["En todas las organizaciones de servicios de Osakidetza, centros concertados, centros privados autorizados y en el Departamento de Salud.", "Solo en los hospitales generales de Osakidetza.", "Exclusivamente en los centros privados concertados.", "Solo en las oficinas del Departamento de Salud central."], correct: 0 },
            { id: 136, text: "Entre las funciones del SAPU se incluyen:", options: ["Diagnosticar y prescribir tratamientos en casos de saturación de la consulta.", "Sancionar económicamente a los profesionales sanitarios.", "Tramitar las bajas laborales de los pacientes.", "Recoger sugerencias, mediar en conflictos y comunicar presuntos incumplimientos de la Declaración de Derechos y Deberes a la dirección."], correct: 3 },
            { id: 137, text: "Si un SAPU recibe una reclamación o solicitud que debe ser resuelta por un órgano distinto a su organización:", options: ["La registrará e iniciará su tramitación, informando al usuario y remitiéndola al órgano competente en tres días hábiles.", "La rechazará inmediatamente e indicará al usuario que busque el órgano correcto.", "La archivará sin más trámite.", "La destruirá por no ser de su competencia."], correct: 0 },
            { id: 138, text: "Las reclamaciones contra los usuarios por incumplimiento de sus deberes recogidos en la Declaración:", options: ["Conllevarán siempre la pérdida definitiva del derecho a la asistencia sanitaria.", "Se tramitarán conforme al procedimiento administrativo o judicial vigente, garantizando los derechos de la persona usuaria.", "No están permitidas, los usuarios no tienen deberes exigibles.", "Serán resueltas por el propio personal sanitario que sufrió el incumplimiento, sin necesidad de expediente."], correct: 1 },
            { id: 139, text: "En caso de reclamaciones contra el personal sanitario por incumplimiento de la normativa sobre derechos del paciente:", options: ["Se aplicarán las normas disciplinarias específicas, pudiendo iniciarse un expediente informativo o sancionador.", "Se le despedirá de forma inmediata sin expediente.", "Solo se tramitarán si el paciente ha sufrido un daño físico irreversible.", "No procede reclamación alguna, las decisiones médicas son incuestionables."], correct: 0 },
            { id: 140, text: "Los deberes recogidos en los artículos 14 al 17 de la Declaración (respecto al funcionamiento de servicios, etc.):", options: ["Solo son exigibles en centros públicos de Osakidetza.", "Serán exigibles igualmente a las personas que utilicen los centros sanitarios privados de Euskadi.", "Solo son exigibles a las personas mayores de edad.", "Son meras recomendaciones sin carácter de exigibilidad en ningún centro."], correct: 1 },
            { id: 141, text: "Según la Ley 41/2002, básica reguladora de la autonomía del paciente, la 'documentación clínica' es:", options: ["El conjunto de facturas generadas por el servicio de salud.", "El carnet de colegiación del médico responsable.", "La tarjeta sanitaria individual del paciente.", "El soporte de cualquier tipo o clase que contiene un conjunto de datos e informaciones de carácter asistencial."], correct: 3 },
            { id: 142, text: "La Ley 41/2002 define a la 'persona usuaria' como:", options: ["La persona que requiere asistencia sanitaria preventiva, diagnóstica, terapéutica, rehabilitadora o de cuidados paliativos.", "La persona que abona directamente la factura sanitaria.", "La persona que utiliza los servicios sanitarios de educación y promoción de la salud, de prevención de enfermedades y de información sanitaria.", "El profesional sanitario que utiliza el sistema informático del centro."], correct: 2 },
            { id: 143, text: "Como regla general, la información clínica asistencial se proporcionará:", options: ["Siempre por escrito y ante notario.", "De forma verbal, dejando constancia en la historia clínica.", "A través de correo electrónico certificado.", "Solo si el paciente la solicita por escrito con 15 días de antelación."], correct: 1 },
            { id: 144, text: "El contenido mínimo de la información para recabar el consentimiento debe incluir:", options: ["El currículum completo del cirujano.", "La finalidad, naturaleza, riesgos y consecuencias de la intervención.", "El coste económico desglosado del material a utilizar.", "Los datos estadísticos internacionales de mortalidad del procedimiento."], correct: 1 },
            { id: 145, text: "El derecho a la información asistencial es garantizado por:", options: ["El director gerente del centro exclusivamente.", "El médico responsable del paciente y también los profesionales que le atiendan durante el proceso asistencial o apliquen una técnica.", "El servicio de admisión del hospital.", "El servicio jurídico del Departamento de Salud."], correct: 1 },
            { id: 146, text: "El titular del derecho a la información clínica es:", options: ["La familia en primer grado siempre y en todo caso.", "El paciente. También serán informadas las personas vinculadas a él, por razones familiares o de hecho, en la medida que el paciente lo permita de manera expresa o tácita.", "El médico de cabecera que derivó al paciente.", "La persona que ejerza como representante legal, excluyendo al propio paciente capaz."], correct: 1 },
            { id: 147, text: "En caso de incapacidad de hecho (falta de capacidad para comprender la información a criterio del médico responsable):", options: ["La información se ocultará a todo el mundo por confidencialidad.", "La información se dará solo a un juez.", "Se paralizará cualquier tratamiento hasta que el paciente recupere la capacidad.", "La información se pondrá en conocimiento de las personas vinculadas al paciente por razones familiares o de hecho."], correct: 3 },
            { id: 148, text: "Si existe riesgo inmediato grave para la integridad física o psíquica del paciente y no es posible conseguir su autorización (ej. urgencia vital inconsciente):", options: ["El médico debe esperar a tener autorización judicial, aunque el paciente fallezca.", "Se debe llamar a la policía antes de actuar.", "El médico esperará a que aparezca un familiar de primer grado, sin importar el tiempo.", "Los profesionales sanitarios podrán llevar a cabo las intervenciones clínicas indispensables sin el consentimiento del paciente."], correct: 3 },
            { id: 149, text: "El consentimiento por representación se otorgará cuando el paciente sea menor de:", options: ["18 años.", "16 años, salvo que se trate de una actuación de grave riesgo.", "14 años.", "12 años."], correct: 1 },
            { id: 150, text: "La información básica que debe darse al paciente antes de una intervención incluye:", options: ["Los riesgos probables en condiciones normales según la experiencia y la ciencia, y los riesgos relacionados con las circunstancias personales del paciente.", "Todos los riesgos teóricos descritos en la literatura mundial, sin importar su frecuencia.", "Solo los beneficios de la intervención para no asustar al paciente.", "Ningún riesgo si la intervención es ambulatoria."], correct: 0 },
            { id: 151, text: "Según la Ley 41/2002, básica reguladora de la autonomía del paciente, ¿dónde se conservará la historia clínica?", options: ["En el archivo del centro sanitario, garantizando su seguridad y confidencialidad.", "En el domicilio del paciente.", "En el Registro Central del Ministerio de Sanidad.", "En las oficinas del Servicio Vasco de Salud - Osakidetza centralizadas."], correct: 0 },
            { id: 152, text: "El acceso a la historia clínica con fines judiciales, epidemiológicos, de salud pública, de investigación o de docencia:", options: ["Obliga a separar los datos de identificación personal de los clínico-asistenciales, salvo que el paciente haya dado su consentimiento previo.", "Permite ver el nombre del paciente siempre que el investigador firme un contrato.", "Está totalmente prohibido en todos los casos.", "Solo puede autorizarlo el propio médico responsable, no la dirección."], correct: 0 },
            { id: 153, text: "De acuerdo con la Ley 41/2002, ¿cuánto tiempo deben conservarse los documentos de la historia clínica?", options: ["Un máximo de 10 años desde el nacimiento del paciente.", "Un mínimo de 5 años contados desde la fecha del alta de cada proceso asistencial.", "Hasta que el paciente fallezca.", "Un mínimo de 2 años desde la última prueba diagnóstica."], correct: 1 },
            { id: 154, text: "Según la Ley 41/2002, el acceso a la historia clínica de los pacientes fallecidos:", options: ["Está prohibido para todo el mundo por respeto a la confidencialidad.", "Se facilitará a las personas vinculadas a él por razones familiares o de hecho, salvo que el fallecido lo hubiese prohibido expresamente y así se acredite.", "Solo se permite por orden judicial tras la defunción.", "Es público para cualquier investigador sanitario."], correct: 1 },
            { id: 155, text: "En caso de que el paciente no acepte el alta propuesta por su médico (y no haya otros motivos clínicos para el ingreso):", options: ["La dirección del centro, a propuesta del médico responsable, podrá disponer el alta tras escuchar al paciente.", "El médico de guardia llamará a las fuerzas de seguridad.", "El paciente tiene derecho absoluto a quedarse en el hospital indefinidamente.", "Se le cobrarán los gastos de estancia a partir de ese momento."], correct: 0 },
            { id: 156, text: "Según la Ley 14/2002, del País Vasco, de Voluntades Anticipadas, el documento de voluntades anticipadas es:", options: ["El documento dirigido al médico responsable en el que una persona mayor de edad, capaz y libre, manifiesta anticipadamente su voluntad sobre los cuidados y el tratamiento.", "El testamento legal de bienes ante notario.", "El documento firmado por el tutor legal del paciente incapaz.", "Una hoja de reclamaciones del centro sanitario."], correct: 0 },
            { id: 157, text: "Para ser otorgante válido de un documento de voluntades anticipadas, la persona debe ser:", options: ["Mayor de 16 años, aunque esté incapacitada judicialmente.", "Mayor de edad, con capacidad de obrar y que actúe libremente.", "Exclusivamente residente en la Comunidad Autónoma Vasca por más de 10 años.", "Cualquier persona desde los 14 años de edad."], correct: 1 },
            { id: 158, text: "La inclusión de los objetivos vitales y valores personales en el Documento de Voluntades Anticipadas tiene como finalidad:", options: ["Desheredar a los familiares no deseados.", "Establecer la funeraria de preferencia.", "Ayudar a interpretar las instrucciones y servir de orientación en la toma de decisiones clínicas para los supuestos no previstos.", "Obligar al médico a aplicar la eutanasia en todo caso."], correct: 2 },
            { id: 159, text: "En el documento de voluntades anticipadas, ¿se puede designar un representante?", options: ["Sí, se puede designar a una o varias personas para que actúen como interlocutores válidos y necesarios con el equipo sanitario.", "Sí, pero solo puede ser el cónyuge o un familiar de primer grado.", "No, la representación recae automáticamente en el médico responsable.", "No, el documento se aplica de forma literal sin intervención de terceros."], correct: 0 },
            { id: 160, text: "Si se designó como representante al cónyuge, ¿cuándo se extingue dicha representación legalmente?", options: ["Nunca, el nombramiento es irrevocable.", "Cuando el representante cambie de domicilio.", "Por la interposición de una demanda de nulidad, separación o divorcio, salvo que el otorgante haya dispuesto expresamente lo contrario.", "Solo mediante el fallecimiento del representante."], correct: 2 },
            { id: 161, text: "Las instrucciones del Documento de Voluntades Anticipadas se pueden referir a:", options: ["Una situación de enfermedad actual o a situaciones eventuales que pudieran presentarse en el futuro.", "Exclusivamente a situaciones psiquiátricas graves.", "Solo a la donación de órganos, no a los tratamientos.", "Únicamente al soporte vital básico."], correct: 0 },
            { id: 162, text: "La formalización del Documento de Voluntades Anticipadas puede realizarse:", options: ["Solo ante Notario.", "Solo ante el personal funcionario encargado del Registro Vasco de Voluntades Anticipadas.", "Solo ante tres testigos.", "Ante Notario, ante el personal funcionario responsable del Registro Vasco, ante personal designado en los centros sanitarios, o ante tres testigos."], correct: 3 },
            { id: 163, text: "En el caso de formalizar el documento de voluntades anticipadas ante testigos, estos deben ser:", options: ["Dos testigos, familiares de primer grado.", "Cinco testigos presenciales.", "Tres testigos mayores de edad y con plena capacidad, de los cuales dos no pueden tener relación de parentesco hasta el segundo grado ni estar vinculados patrimonialmente con el otorgante.", "No se permite la formalización mediante testigos en la normativa vasca."], correct: 2 },
            { id: 164, text: "El Documento de Voluntades Anticipadas podrá ser modificado:", options: ["En cualquier momento, siempre que la persona conserve su capacidad y lo haga por escrito con los mismos requisitos formales.", "Solo una vez cada cinco años.", "Nunca, tiene carácter definitivo.", "Únicamente por orden judicial."], correct: 0 },
            { id: 165, text: "La revocación del Documento de Voluntades Anticipadas exige:", options: ["Que se comunique verbalmente a un familiar.", "Declaración escrita ante Notario, encargado del Registro, personal autorizado o tres testigos.", "Solo se puede revocar si se elaboró inicialmente ante Notario.", "Ruptura física del documento original frente al médico."], correct: 1 },
            { id: 166, text: "Si un paciente conserva su capacidad y puede expresarse libremente, ante una discrepancia entre lo que dice en ese momento y lo escrito en su Documento de Voluntades Anticipadas:", options: ["Prevalece siempre el documento escrito por ser legal.", "Debe decidir el representante legal.", "Prevalece la voluntad del paciente expresada de forma fehaciente en ese momento.", "El médico decidirá la actuación clínica basándose en el protocolo del hospital."], correct: 2 },
            { id: 167, text: "Respecto a las instrucciones contenidas en el Documento de Voluntades Anticipadas, se tendrán por no puestas:", options: ["Aquellas que sean contrarias al ordenamiento jurídico vigente en el momento en que deban aplicarse.", "Aquellas que rechacen la alimentación artificial.", "Aquellas que soliciten no recibir reanimación cardiopulmonar.", "Cualquier instrucción que difiera de la opinión de la familia."], correct: 0 },
            { id: 168, text: "Además de las contrarias al ordenamiento jurídico, ¿qué otras instrucciones se tendrán por no puestas en un Documento de Voluntades Anticipadas?", options: ["Las que soliciten demasiada información clínica.", "Las redactadas en un idioma extranjero.", "Las que no cuenten con el visto bueno previo de un abogado.", "Las que sean contrarias a la lex artis o las que correspondan a supuestos distintos de los previstos por la persona otorgante."], correct: 3 },
            { id: 169, text: "El Registro Vasco de Voluntades Anticipadas:", options: ["Es un registro aislado que solo pueden consultar los médicos vascos.", "Tiene un coste de mantenimiento anual para el otorgante.", "Se interconecta con el Registro Nacional de Instrucciones Previas para garantizar su eficacia en todo el Sistema Nacional de Salud.", "No permite la cancelación de inscripciones previas."], correct: 2 },
            { id: 170, text: "Un Documento de Voluntades Anticipadas válidamente formalizado pero no inscrito en el Registro Vasco:", options: ["Es nulo de pleno derecho.", "Solo tiene validez legal si se legaliza a posteriori.", "Exige la presencia de un Notario en la habitación del hospital para ser válido.", "Tiene plena eficacia y el equipo sanitario deberá respetarlo si se le hace entrega del mismo."], correct: 3 },
            { id: 171, text: "Según la LOPDGDD, en relación con las personas fallecidas, tienen derecho de acceso a sus datos de salud (y a su rectificación/supresión):", options: ["Solo el Juez encargado del caso.", "Exclusivamente el cónyuge superviviente.", "Las personas vinculadas al fallecido por razones familiares o de hecho, o herederos, salvo que el fallecido lo hubiese prohibido expresamente o lo impida una ley.", "Están totalmente bloqueados para cualquier familiar de forma permanente."], correct: 2 },
            { id: 172, text: "Según el RGPD y la LOPDGDD, para que el consentimiento para el tratamiento de datos de salud sea válido, debe ser:", options: ["Consentimiento tácito por omisión (el silencio).", "Mediante una clara acción afirmativa y manifestación de voluntad libre, específica, informada e inequívoca.", "Basta con una casilla ya marcada por defecto en el formulario.", "Verbal, sin necesidad de registro alguno."], correct: 1 },
            { id: 173, text: "En la protección de datos, el tratamiento de los datos personales de un menor de edad basado en el consentimiento es lícito cuando éste sea mayor de:", options: ["18 años.", "16 años.", "14 años.", "12 años."], correct: 2 },
            { id: 174, text: "La LOPDGDD considera categorías especiales de datos, cuyo tratamiento requiere mayores garantías, a los datos que revelen:", options: ["Solo el número de cuenta bancaria y DNI.", "La dirección postal y los números de teléfono.", "El estado civil y el grado de parentesco.", "Ideología, afiliación sindical, religión, orientación sexual, origen racial o étnico y datos relativos a la salud o genéticos."], correct: 3 },
            { id: 175, text: "Respecto al tratamiento de datos relativos a infracciones y condenas penales, la normativa permite que:", options: ["Cualquier empresa cree un registro privado de penados.", "Los abogados y procuradores recaben esta información de sus clientes para el ejercicio de sus funciones.", "Los hospitales soliciten antecedentes penales a todos los pacientes antes de ingresar.", "Las bases de datos policiales sean de acceso público y universal."], correct: 1 },

            // BLOQUE 4
            { id: 176, text: "El derecho de rectificación de datos personales implica que la persona afectada deberá:", options: ["Exigir la rectificación verbalmente al personal de admisión sin necesidad de pruebas.", "Indicar en su solicitud a qué datos se refiere y la corrección a realizar, acompañando la justificación de la inexactitud cuando sea preciso.", "Abonar una tasa administrativa previa para tramitar la corrección de errores materiales.", "Volver a darse de alta en el sistema para sobreescribir sus datos."], correct: 1 },
            { id: 177, text: "Los datos captados por sistemas de videovigilancia en los centros sanitarios deberán ser suprimidos:", options: ["En el plazo máximo de un año desde su captación.", "Cuando lo solicite la empresa de seguridad privada.", "En el plazo máximo de un mes desde su captación, salvo que hubieran de ser conservados para acreditar la comisión de actos contra la integridad de personas, bienes o instalaciones.", "No existe plazo máximo si el centro justifica necesidades de seguridad ciudadana."], correct: 2 },
            { id: 178, text: "En los sistemas de información de denuncias internas (canales de denuncia), los datos deben suprimirse del sistema:", options: ["En un plazo máximo de tres meses desde su introducción si no se ha iniciado investigación, salvo para dejar evidencia del funcionamiento del sistema.", "De manera inmediata al recibirse la denuncia.", "A los cinco años, como cualquier dato contable.", "Nunca, se conservan de por vida en el historial del trabajador."], correct: 0 },
            { id: 179, text: "La Agencia Española de Protección de Datos (AEPD) tiene la naturaleza jurídica de:", options: ["Autoridad Administrativa Independiente de ámbito estatal.", "Dirección General integrada en el Ministerio de Justicia.", "Asociación privada de utilidad pública.", "Organismo Autónomo adscrito al Ministerio de Sanidad."], correct: 0 },
            { id: 180, text: "La Presidencia de la Agencia Española de Protección de Datos será nombrada por:", options: ["El Rey, a propuesta exclusiva del Consejo General del Poder Judicial.", "El Presidente del Gobierno a su libre voluntad.", "Mayoría simple del Senado.", "El Gobierno, a propuesta del Ministerio de Justicia, debiendo ser ratificada por las tres quintas partes de la Comisión de Justicia del Congreso de los Diputados."], correct: 3 },
            { id: 181, text: "El Instituto Vasco de la Mujer-Emakunde se configura como un organismo autónomo a disposición de:", options: ["Cualquier persona o grupo discriminado por razón de sexo.", "Exclusivamente de las mujeres víctimas de violencia de género.", "Solo de las empleadas públicas del Gobierno Vasco.", "Únicamente de las asociaciones feministas registradas."], correct: 0 },
            { id: 182, text: "El objeto de la Ley de Igualdad de Mujeres y Hombres del País Vasco incluye expresamente la consecución de:", options: ["La igualación de sueldos en todos los sectores privados sin excepciones.", "La supresión de los planes de igualdad en la administración pública.", "Una sociedad libre de violencia machista y la eliminación de toda forma de discriminación por razón de sexo.", "La superioridad institucional de la mujer sobre el hombre."], correct: 2 },
            { id: 183, text: "Según la Ley de Igualdad vasca, sus principios y medidas son de aplicación a las entidades privadas:", options: ["Nunca, ya que la ley solo rige para la administración pública.", "Siempre y de forma imperativa para cualquier empresa desde el día de su creación.", "Cuando suscriban contratos, convenios o reciban subvenciones de las administraciones públicas, o presten un servicio público.", "Solo si son empresas de más de 500 trabajadores."], correct: 2 },
            { id: 184, text: "La perspectiva interseccional, contemplada en las leyes de igualdad, implica:", options: ["Separar las políticas de salud de las de género.", "Tener en cuenta de manera integrada que las personas pueden sufrir distintas formas de discriminación combinadas (sexo, etnia, edad, discapacidad, etc.).", "Promover la contratación de hombres en sectores feminizados.", "Eliminar el sexo como variable de estudio en las estadísticas de Osakidetza."], correct: 1 },
            { id: 185, text: "Para la consecución de una representación equilibrada de mujeres y hombres, la normativa establece que la presencia de mujeres:", options: ["No podrá superar en ningún caso el 50% de la plantilla.", "Debe ser del 100% en los departamentos de salud materno-infantil.", "Podrá superar el 60% en órganos o tribunales cuando se justifique por la necesidad de corregir una infrarrepresentación histórica de las mujeres en ese ámbito.", "Es irrelevante si la selección es por concurso de méritos ciegos."], correct: 2 },
            { id: 186, text: "La evaluación previa del impacto en función del género es un trámite de carácter preceptivo en:", options: ["La redacción de cualquier historia clínica hospitalaria.", "La elaboración de planes de ordenación territorial y urbanística, así como de normas de la administración.", "Las decisiones de tratamiento oncológico.", "Las actas de reunión de los sindicatos sanitarios."], correct: 1 },
            { id: 187, text: "Para recibir subvenciones públicas, las empresas de más de 50 trabajadores deberán acreditar:", options: ["Tener una plantilla 100% paritaria.", "La adopción de medidas para prevenir y combatir el acoso sexual y el acoso por razón de sexo.", "Que la dirección general la ostenta una mujer.", "Que han donado un 2% a asociaciones de igualdad."], correct: 1 },
            { id: 188, text: "La violencia machista se define normativamente en Euskadi como:", options: ["Un problema exclusivo del ámbito doméstico y familiar.", "Una violación de los derechos humanos y un problema de salud pública de primera magnitud, originado por las relaciones de poder asimétricas.", "Un conflicto de pareja que debe resolverse mediante mediación penal privada.", "Un asunto que solo atañe a la Ertzaintza y a los juzgados."], correct: 1 },
            { id: 189, text: "Las últimas modificaciones legales vascas reconocen de forma explícita nuevas formas de violencia machista, entre ellas:", options: ["La violencia laboral general y el estrés crónico.", "La violencia institucional, la violencia obstétrica, la violencia digital y la violencia política de género.", "El mobbing entre compañeros del mismo sexo.", "El robo con intimidación en la vía pública."], correct: 1 },
            { id: 190, text: "El derecho a la reparación integral de las víctimas de violencia machista se establece de acuerdo con:", options: ["El Código Civil español.", "Los estándares del Convenio del Consejo de Europa (Convenio de Estambul) y la normativa internacional.", "Las ordenanzas municipales de cada Ayuntamiento.", "El convenio colectivo de Osakidetza."], correct: 1 },
            { id: 191, text: "El Plan de Salud de Euskadi 2030 se articula en torno a:", options: ["Diez mandamientos en salud pública.", "Dos líneas estratégicas exclusivas para Osakidetza.", "Siete Objetivos Generales que abordan los principales retos de salud.", "Cinco pilares de sostenibilidad hospitalaria."], correct: 2 },
            { id: 192, text: "La Visión del Plan de Salud Euskadi 2030 es:", options: ["Reducir el gasto sanitario a la mitad para el año 2030.", "Liderar, como un esfuerzo conjunto de gobierno y sociedad, una Euskadi más saludable, justa y sostenible que garantice el bienestar de todas las personas.", "Lograr la privatización progresiva de los servicios de soporte.", "Convertir todos los hospitales en centros universitarios."], correct: 1 },
            { id: 193, text: "Entre los principios que sustentan el Plan de Salud 2030, señale cuál NO pertenece a ellos:", options: ["Universalidad, equidad y solidaridad.", "Sostenibilidad e innovación.", "Autosuficiencia presupuestaria de cada OSI mediante el cobro de servicios.", "Participación ciudadana y corresponsabilidad."], correct: 2 },
            { id: 194, text: "El Objetivo General 1 (OG1) del Plan de Salud 2030 se centra específicamente en:", options: ["El envejecimiento saludable y la cronicidad.", "Lograr que la infancia y los adolescentes nazcan y crezcan desarrollando todo su potencial de salud.", "La digitalización de las recetas médicas.", "La construcción de nuevos centros de atención primaria."], correct: 1 },
            { id: 195, text: "El Objetivo General 4 (OG4) del Plan de Salud 2030 aborda el sistema sanitario orientándolo hacia:", options: ["La reducción del personal administrativo en hospitales.", "La calidad, la humanización de la asistencia, la seguridad y la orientación a resultados en salud.", "La exclusión de tratamientos crónicos de alto coste.", "La centralización total de las compras de material sanitario."], correct: 1 },
            { id: 196, text: "El enfoque 'Una Sola Salud' (One Health) promovido en el Plan de Salud 2030 significa:", options: ["Que debe haber un único hospital centralizado por cada provincia.", "Que el paciente solo debe ser atendido por un mismo médico de cabecera toda su vida.", "La integración de la salud humana, la salud animal y la salud ambiental (ecosistemas) como un todo interconectado.", "El uso de un único sistema informático para todos los historiales médicos."], correct: 2 },
            { id: 197, text: "En la evaluación del estado de salud de Euskadi dentro del Plan 2030 se utiliza el indicador AVAD. ¿Qué significan estas siglas?", options: ["Accidentes Vasculares Altamente Devastadores.", "Atención de Vanguardia de Alta Dependencia.", "Área de Validación de Atención Directa.", "Años de Vida sana perdidos Ajustados por Discapacidad."], correct: 3 },
            { id: 198, text: "La elaboración del Plan de Salud 2030 ha sido el resultado de:", options: ["El trabajo individual del Consejero de Salud.", "Un informe de auditoría encargado a una consultora privada extranjera.", "Un proceso técnico liderado exclusivamente por la Dirección Financiera de Osakidetza.", "Un proceso participativo en el que han intervenido más de 300 personas de distintos ámbitos institucionales, profesionales y sociales."], correct: 3 },
            { id: 199, text: "La Misión del Plan de Salud Euskadi 2030 se define como:", options: ["Administrar directamente los recursos humanos de las organizaciones sanitarias de Euskadi.", "Regular los salarios de los profesionales sanitarios privados.", "Definir el horizonte de salud de Euskadi y desplegar estrategias y políticas de salud eficaces, eficientes y equitativas de forma intersectorial.", "Sustituir a la Ley de Ordenación Sanitaria de Euskadi vigente."], correct: 2 },
            { id: 200, text: "De acuerdo con el diagnóstico de situación del Plan de Salud 2030, el principal reto demográfico y epidemiológico es:", options: ["Aumentar la natalidad mediante incentivos hospitalarios.", "Disminuir los tiempos de espera en las consultas de traumatología.", "Reducir la morbimortalidad evitable y hacer frente al envejecimiento, las enfermedades crónicas y las desigualdades sociales en salud.", "Eliminar por completo las enfermedades infecciosas estacionales como la gripe."], correct: 2 },
            { id: 201, text: "¿Qué órganos fueron responsables de la dirección y elaboración del Plan de Salud Euskadi 2030, según el documento?", options: ["El Consejo de Gobierno y el Departamento de Hacienda.", "Un Comité de Dirección y un Comité Estratégico.", "La Dirección General de Osakidetza y Lehendakaritza.", "El Observatorio de Salud y la consultora LKS S Coop."], correct: 1 },
            { id: 202, text: "Dentro del Objetivo General 5 del Plan de Salud Euskadi 2030, ¿cuáles son las características que deben definir al sistema de salud pública para responder a los nuevos retos?", options: ["Estratégico, descentralizado, participativo y eficiente.", "Flexible, sólido, ágil y escalable.", "Universal, equitativo, transparente y tecnológico.", "Resiliente, preventivo, comunitario e integral."], correct: 3 },
            { id: 203, text: "¿Qué enfoque de investigación prioriza el Plan de Salud Euskadi 2030 para asegurar que los avances científicos lleguen de forma efectiva a la práctica clínica y la salud de la población?", options: ["Enfoque de investigación básica y fundamental.", "Enfoque de investigación traslacional.", "Enfoque de investigación puramente epidemiológica.", "Enfoque de investigación competitiva internacional."], correct: 1 },
            { id: 204, text: "Según el modelo de evaluación del Plan de Salud Euskadi 2030, ¿cuáles son los cuatro criterios fundamentales para determinar el éxito de las intervenciones?", options: ["Impacto, cobertura, equidad y transparencia.", "Relevancia, efectividad, eficiencia y sostenibilidad.", "Rentabilidad, participación, innovación y prestigio.", "Calidad, calidez, rapidez y ahorro presupuestario."], correct: 1 },
            { id: 205, text: "En la lucha contra las desigualdades, ¿qué tipo de soluciones habitacionales promueve el Plan de Salud Euskadi 2030 para las diferentes etapas de la vida?", options: ["Construcción de viviendas de protección oficial exclusivamente rurales.", "Soluciones habitacionales asequibles, accesibles y adaptadas al ciclo vital.", "Ayudas directas al alquiler únicamente para personas menores de 30 años", "Fomento de grandes centros residenciales para todas las personas con enfermedades crónicas."], correct: 1 },
            { id: 206, text: "Según la comparativa de la Memoria Económica del Plan de Salud Euskadi 2030, ¿cuál es el programa presupuestario (fuera del gasto general de Osakidetza) con mayor dotación?", options: ["Programa de Salud Pública.", "Programa de Farmacia.", "Programa de Adicciones.", "Programa de Investigación y Planificación."], correct: 0 },
            { id: 207, text: "El Plan de Salud Euskadi 2030 busca lograr \"comunidades amigables\" para las personas mayores. ¿Cuál es la finalidad última de esta estrategia?", options: ["Segregar los espacios públicos por franjas de edad.", "Adaptar el entorno fisico y social para fomentar un envejecimiento activo y con sentido.", "Aumentar el número de plazas en residencias geriátricas de alta especialización.", "Limitar el acceso de vehículos a las zonas cercanas a los centros de salud."], correct: 1 },
            { id: 208, text: "En el ámbito de la salud digital, ¿qué concepto destaca el Plan de Salud Euskadi 2030 para transformar la atención personalizada?", options: ["La teleasistencia robótica obligatoria en todos los domicilios.", "La medicina de precisión y la integración de datos genómicos.", "La eliminación definitiva de la historia clínica en papel en favor del PDF.", "La creación de una red social exclusiva para pacientes crónicos/as."], correct: 1 },
            { id: 209, text: "¿Cómo define el Plan de Salud Euskadi 2030 el concepto de \"Intersectorialidad\" en la gestión de la salud?", options: ["La competencia entre diferentes sectores para obtener fondos públicos.", "La colaboración entre departamentos del Gobierno para que la salud esté en todas las políticas.", "La privatización de sectores sanitarios no críticos.", "La creación de un único departamento que gestione salud, educación y vivienda."], correct: 1 },
            { id: 210, text: "¿Cuál es la visión del Plan de Salud Euskadi 2030 sobre el uso de la evidencia científica en la toma de decisiones políticas?", options: ["Es un elemento opcional supeditado a la oportunidad política.", "Es la base fundamental para el diseño, implementación y evaluación de las políticas de salud.", "Solo se debe aplicar en casos de alertas sanitarias internacionales.", "Se reserva exclusivamente para el ámbito académico, no para el legislativo."], correct: 1 },
            { id: 211, text: "Según el análisis del contexto social del documento de Diagnóstico del Pacto Vasco de Salud de Euskadi, ¿qué factor se identifica como un motor clave para que la ciudadanía del siglo XXI demande un papel más activo en su salud?", options: ["El incremento exclusivo de la esperanza de vida al nacer.", "El acceso generalizado a la información y un mayor nivel educativo en la CAPV.", "La reducción drástica de las listas de espera en consultas externas.", "La implementación de la receta electrónica en todas las farmacias."], correct: 1 },
            { id: 212, text: "El documento de Diagnóstico del Pacto Vasco de Salud de Euskadi señala que los flujos migratorios actuales en Euskadi:", options: ["No tienen impacto relevante en el perfil epidemiológico de la comunidad.", "Revelan patologías anteriormente poco conocidas en nuestro entorno, pero prevalentes en otras latitudes.", "Se limitan exclusivamente a personas en edad laboral con excelente estado de salud inicial.", "Han provocado la saturación irreversible de los servicios de urgencias hospitalarias."], correct: 1 },
            { id: 213, text: "¿Cuál es uno de los principales desafíos identificados en el documento de Diagnóstico del Pacto Vasco de Salud de Euskadi respecto a la formación y relevo del personal sanitario?", options: ["La excesiva oferta de plazas MIR en todas las especialidades médicas.", "La falta de interés de las nuevas generaciones por las profesiones biosanitarias.", "La necesidad de planificar el relevo ante la jubilación de cohortes numerosas de profesionales.", "La prohibición de la formación continua dentro del horario laboral."], correct: 2 },
            { id: 214, text: "Sobre el impacto del cambio global y climático, el documento de Diagnóstico del Pacto Vasco de Salud de Euskadi advierte de la aparición de:", options: ["Patologías ligadas exclusivamente al consumo de alimentos ultraprocesados.", "Nuevos vectores y virus anteriormente inexistentes en nuestro entorno, como el virus del Nilo.", "Una disminución natural de las enfermedades respiratorias debido al aumento de temperaturas.", "La erradicación total de las enfermedades infecciosas estacionales."], correct: 1 },
            { id: 215, text: "El documento de Diagnóstico del Pacto Vasco de Salud de Euskadi propone que los indicadores sanitarios para evaluar el sistema deben:", options: ["Basarse exclusivamente en mediciones de actividad (número de consultas y cirugías).", "Ser confidenciales y accesibles únicamente para la alta dirección del Departamento de Salud.", "Ignorar la perspectiva de género para simplificar la toma de datos estadísticos.", "Reflejar resultados en salud y sostenibilidad, y no solo volumen de actividad."], correct: 3 },
            { id: 216, text: "¿Cuál es la finalidad principal de los Valores Fundamentales del Pacto Vasco de Salud, según el Libro de Valores y principios?", options: ["Ser la base para la elaboración del futuro Plan Estratégico de Osakidetza.", "Establecer la estructura financiera y la autonomía de gestión del sistema de salud.", "Ser el fundamento ético y social que soporta la actividad del Sistema Público de Salud de Euskadi.", "Garantizar la cobertura universal únicamente a la ciudadanía vasca empadronada."], correct: 2 },
            { id: 217, text: "¿Cuál de los siguientes es un Valor Fundamental explícito del Pacto Vasco de Salud, además de la Universalidad y la Equidad?", options: ["La Sostenibilidad del sistema.", "La Eficiencia en el gasto.", "La Corresponsabilidad.", "El Plurilingüismo como eje central de la atención."], correct: 2 },
            { id: 218, text: "El principio rector de la Salud en Todas las Políticas (STP) en el Pacto Vasco de Salud tiene como alcance la necesidad de:", options: ["Incorporar la perspectiva de salud en todas las decisiones y políticas públicas, fuera del ámbito sanitario.", "Priorizar el presupuesto del Departamento de Salud sobre el resto de las carteras del Gobierno Vasco.", "Centralizar toda la toma de decisiones en el Consejo Asesor del Departamento de Salud.", "Desarrollar un plan de choque específico para la Atención Primaria, desvinculado de la hospitalaria."], correct: 0 },
            { id: 219, text: "El principio de Innovación en el Pacto Vasco de Salud se aplica a:", options: ["Exclusivamente a la aplicación de nuevas tecnologías de imagen médica.", "La I+D+i en todas las fases y dimensiones de la salud, incluyendo la organizativa y la asistencial.", "La importación de modelos de éxito de otros sistemas sanitarios europeos.", "La digitalización de la historia clínica en Osakidetza."], correct: 1 },
            { id: 220, text: "En el marco del Pacto Vasco de Salud, el principio rector de la Transparencia y Rendición de Cuentas tiene como objetivo principal:", options: ["Garantizar la confidencialidad absoluta de los datos de salud de las personas pacientes.", "Asegurar que las personas gestoras tengan acceso a todos los cuadros de mando de la OSI.", "Comunicar regularmente los resultados y progresos del sistema a todas las partes involucradas, fortaleciendo la confianza.", "Permitir auditorías externas del gasto sanitario cada cinco años."], correct: 2 },
            { id: 221, text: "En el marco del Pacto Vasco de Salud, dentro de los principios rectores, la \"Orientación al Valor\" significa que el sistema debe priorizar:", options: ["Las intervenciones que generen los mejores resultados relevantes para la persona al menor coste posible.", "El valor de mercado de las acciones de las empresas proveedoras de tecnología.", "El incremento constante de las infraestructuras fisicas sobre la inversión en personal.", "La compra masiva de medicamentos de marca sobre los genéricos."], correct: 0 },
            { id: 222, text: "¿En qué grandes ámbitos se estructuran las Líneas Estratégicas del Pacto Vasco de Salud?", options: ["Cinco Líneas Estratégicas. prevención y promoción de la salud; atención a la enfermedad; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y Gobernanza.", "Seis Líneas Estratégicas: prevención y promoción de la salud; atención a la enfermedad; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y transparencia y participación ciudadana.", "Seis Líneas Estratégicas: prevención y promoción de la salud; atención a la enfermedad; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y gobernanza.", "Seis Lineas Estratégicas: prevención y promoción de la salud; atención sociosanitaria; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y gobernanza."], correct: 2 },
            { id: 223, text: "La Línea Estratégica I del Pacto Vasco de Salud, centrada en el enfoque \"One Health\" (Una Sola Salud), propone:", options: ["Centralizar todos los hospitales en una única gerencia provincial.", "Crear un seguro de salud único para todas las mascotas de la CAPV.", "Centrarse exclusivamente en la salud humana, delegando la ambiental a otros departamentos.", "Integrar la salud humana, animal y ambiental en la planificación y vigilancia sanitaria."], correct: 3 },
            { id: 224, text: "¿Cuál es el papel de la Atención Primaria y Comunitaria dentro de las Líneas Estratégicas del Pacto Vasco de Salud?", options: ["Actuar como un servicio de triaje rápido para derivar todos los casos al hospital.", "Ser un servicio opcional para quienes no dispongan de seguro privado.", "Limitarse a la atención administrativa y la gestión de bajas laborales.", "Ser la base estratégica que cohesione y sustente todo el sistema de salud vasco."], correct: 3 },
            { id: 225, text: "En relación con la Línea Estratégica 06 sobre \"Cronicidad\" del Pacto Vasco de Salud, ¿qué objetivo se persigue primordialmente?", options: ["Institucionalizar a todas las personas con enfermedades crónicas en centros especializados.", "Reforzar la autonomía y corresponsabilidad de las personas con enfermedades crónicas.", "Sustituir las consultas médicas presenciales por seguimiento telefónico automático.", "Reducir la cobertura de medicamentos para patologías de larga duración."], correct: 1 },
            { id: 226, text: "La Línea Estratégica 07 sobre \"Atención Sociosanitaria\" del Pacto Vasco de Salud subraya la necesidad de:", options: ["Separar definitivamente las competencias de Salud de las de Servicios Sociales.", "Mejorar la coordinación y el tránsito de las personas entre el sistema sanitario y el social.", "Eliminar las ayudas a la dependencia para fomentar el ahorro público.", "Obligar a las personas pacientes a elegir entre atención médica o apoyo social."], correct: 1 },
            { id: 227, text: "Respecto a la \"Salud Mental\" (Línea 11), el Pacto Vasco de Salud pone el foco en:", options: ["La promoción del bienestar emocional y la detección precoz, especialmente en jóvenes.", "El aislamiento preventivo de las personas con trastornos mentales graves.", "La medicalización sistemática de cualquier malestar emocional de la ciudadanía.", "La reducción de la plantilla de psicología en los centros de salud primaria."], correct: 0 },
            { id: 228, text: "La Línea Estratégica 18 sobre \"Digitalización en Salud\" del Pacto Vasco de Salud busca la transformación digital para:", options: ["Reemplazar al personal sanitario por sistemas de inteligencia artificial autónomos.", "Eliminar el papel de todos los archivos históricos sin digitalizar previamente.", "Facilitar la accesibilidad, la personalización de la atención y la eficiencia organizativa.", "Crear una base de datos pública con el historial clínico de toda la ciudadanía."], correct: 2 },
            { id: 229, text: "En la \"Política de Personas\" (Línea 21) del Pacto Vasco de Salud, se establece como prioridad:", options: ["Facilitar la jubilación forzosa a los 60 años para reducir costes laborales.", "Fortalecer la atracción, fidelización, desarrollo y liderazgo de las y los profesionales.", "Prohibir la participación de los sindicatos en la toma de decisiones estratégicas.", "Sustituir al personal fijo por contratos temporales para ganar flexibilidad."], correct: 1 },
            { id: 230, text: "La Línea Estratégica 24 sobre \"Derechos Lingüísticos\" del Pacto Vasco de Salud tiene como fin:", options: ["Garantizar que las personas pacientes puedan ser atendidas en la lengua oficial de su elección.", "Obligar a toda la ciudadanía a realizar sus consultas médicas exclusivamente en euskera.", "Eliminar el uso de lenguas extranjeras en la formación médica especializada.", "Centralizar los servicios de traducción en una única sede en Vitoria-Gasteiz."], correct: 0 },
            { id: 231, text: "¿Cuál es el periodo de vigencia indicado en el título de la \"Estrategia de Seguridad del Paciente\" de Osakidetza, y en qué mes y año se publicó su primera edición?", options: ["Vigencia 2021-2030, editada en enero de 2023.", "Vigencia 2020-2024, editada en diciembre de 2022.", "Vigencia 2020-2030, editada en abril de 2023.", "Vigencia 2023-2030, editada en julio de 2023."], correct: 2 },
            { id: 232, text: "¿Cuál es el Objetivo General establecido para la \"Estrategia de Seguridad del Paciente 20-30\"?", options: ["Reducir a cero los eventos adversos mediante la incorporación de tecnología robótica.", "Mejorar la calidad asistencial del sistema sanitario vasco.", "Promover el máximo nivel de seguridad posible, minimizando la probabilidad de ocurrencia de incidentes de seguridad en el transcurso de la asistencia sanitaria.", "Centralizar la gestión de riesgos en un único organismo fuera de Osakidetza."], correct: 2 },
            { id: 233, text: "El principio hipocrático al que se hace referencia en la \"Estrategia de Seguridad del Paciente 20-30\", y que la ciudadanía asume que se verifica en el transcurso de la actividad asistencial, es:", options: ["Salus populi suprema lex esto (la salud del pueblo es la ley suprema).", "Corpus sanum in mente sana (mente sana en cuerpo sano).", "Lex artis ad hoc (ley del arte para el caso).", "Primum non nocere (primero no hacer daño)."], correct: 3 },
            { id: 234, text: "¿A qué periodos correspondieron las dos estrategias previas de seguridad de paciente publicadas en Euskadi, de las cuales esta Estrategia 20-30 es la tercera?", options: ["2008-2012 y 2013-2017.", "2010-2015 у 2016-2020.", "2013-2016 y 2017-2020.", "2018-2021 y 2022-2025."], correct: 2 },
            { id: 235, text: "¿Cuáles son las dos nuevas Líneas de Acción incorporadas en la \"Estrategia de Seguridad del Paciente 20-30\" que responden a una necesidad percibida por las personas expertas?", options: ["Seguridad en Pediatría y Buenas Prácticas en el Uso de Biológicos.", "Atención en Cuidados Paliativos y Seguridad Domiciliaria.", "La Seguridad de Paciente en Emergencias y la Prevención del Suicidio.", "Seguridad en Salud Mental y Prevención de las Úlceras por Presión."], correct: 3 },
            { id: 236, text: "De acuerdo con la \"Estrategia de Seguridad de Paciente 20-30\" ¿cómo se denomina al incidente de seguridad que, a diferencia del incidente sin daño, sí ocasiona algún tipo de daño a las personas atendidas?", options: ["Error no evitable.", "Circunstancia notificable.", "Fallo latente.", "Evento Adverso."], correct: 3 },
            { id: 237, text: "¿Cuál es el enfoque principal de la Línea de Acción Corporativa L2 de la \"Estrategia de Seguridad del Paciente 20-30\"?", options: ["Implicación de pacientes en su seguridad.", "Conciliación de la medicación.", "Atención a las segundas y terceras víctimas.", "Gestión de los incidentes de seguridad."], correct: 2 },
            { id: 238, text: "¿Cuál de los siguientes es el Objetivo Específico número 1 de la \"Estrategia de Seguridad del Paciente 20-30\", enfocado en el cambio interno?", options: ["Garantizar la continuidad de las líneas de acción y proyectos previamente implantados.", "Impulsar la cultura de seguridad de paciente en las organizaciones de servicios de Osakidetza, promoviendo la formación y sensibilización como aspectos clave.", "Optimizar la prescripción de pruebas diagnósticas que utilizan radiación ionizante.", "Implantar un sistema de identificación inequívoca de pacientes en todas las fases del proceso asistencial."], correct: 1 },
            { id: 239, text: "Según la \"Estrategia de Seguridad del Paciente 20-30\", el Objetivo General de la Línea de Acción L4 \"Implicación de pacientes en su seguridad\" es:", options: ["Garantizar que todas las personas pacientes reciban un plan de acogida con información de seguridad.", "Potenciar las capacidades de las personas pacientes para actuar como personal de apoyo en las unidades de enfermería.", "Promover la participación de pacientes, familiares y personas cuidadoras para mejorar la seguridad del sistema sanitario.", "Establecer un sistema de recompensas económicas para pacientes que notifiquen incidentes."], correct: 2 },
            { id: 240, text: "La Línea de Acción Corporativa L8 de la \"Estrategia de Seguridad del Paciente 20-30\" está dedicada a:", options: ["Conciliación de la medicación.", "Prevención y control de las infecciones relacionadas con la asistencia sanitaria.", "Seguridad en el proceso asistencial gestación-parto-puerperio.", "Seguridad transfusional."], correct: 1 },
            { id: 241, text: "¿A qué se refiere la Línea de Acción Corporativa L10 de la \"Estrategia de Seguridad del Paciente 20-30\", cuyo objetivo es reducir los eventos adversos específicos de un proceso asistencial?", options: ["Atención Primaria.", "Cirugía Segura.", "Seguridad en el proceso asistencial gestación-parto-puerperio.", "Seguridad de las personas pacientes en los servicios de urgencias."], correct: 3 },
            { id: 242, text: "¿Qué documento se menciona en la \"Estrategia de Seguridad del Paciente 20-30\" como el que determinó que las personas atendidas por un sistema medicalizado (tipo 061/112) presentan un mayor porcentaje de incidentes de seguridad en el entorno de Emergencias?", options: ["Estudio Nacional de Efectos Adversos en centros hospitalarios (ENEAS).", "Estudio APEAS.", "Estudio EVADUR.", "Informe del Instituto de Medicina de los Estados Unidos (IOM)."], correct: 2 },
            { id: 243, text: "El capítulo de Formación de la \"Estrategia de Seguridad del Paciente 20-30\" señala que, además de impulsar el desarrollo de prácticas seguras, las organizaciones comprometidas orientan sus esfuerzos a aumentar la formación en los llamados:", options: ["Factores humanos o factores no técnicos.", "Factores biomédicos y patofisiológicos.", "Factores económicos y de sostenibilidad.", "Factores organizativos de Osakidetza."], correct: 0 },
            { id: 244, text: "¿Cuál de las siguientes Líneas de Acción de la \"Estrategia de Seguridad del Paciente 20-30\" NO está relacionada con el sistema de utilización del medicamento?", options: ["L5. Conciliación de la medicación.", "L14. Buenas prácticas asociadas a la utilización de medicación.", "L6. Optimización en la prescripción de pruebas diagnósticas que utilizan radiación ionizante.", "L7. Seguridad transfusional (Nota: la seguridad transfusional se considera una línea separada, aunque implica la administración de productos sanguíneos)."], correct: 2 },
            { id: 245, text: "¿Cuántas Líneas de Acción Corporativas (L1 a L...) se definen en la Estrategia de Seguridad del Paciente 20-30?", options: ["14 líneas de acción.", "15 líneas de acción.", "16 líneas de acción.", "17 líneas de acción."], correct: 3 },
            { id: 246, text: "Según el diagnóstico del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza, ¿qué porcentaje de mujeres y hombres, respectivamente, componía la plantilla total de Osakidetza en enero de 2025?", options: ["60% mujeres y 40% hombres", "75% mujeres y 25% hombres", "80% mujeres y 20% hombres", "90% mujeres y 10% hombres"], correct: 2 },
            { id: 247, text: "Una de las metas del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza es la \"CAPACITACIÓN EN IGUALDAD\". ¿Cuál es su objetivo principal?", options: ["Reducir la brecha de género en investigación en un 4%.", "Conseguir que todas las personas trabajadoras de Osakidetza conozcan el Plan y el Protocolo de Acoso.", "Reducir a la mitad las categorías con brecha retributiva superior al 5%.", "Garantizar la formación básica, progresiva, permanente y obligatoria de todo el personal de Osakidetza."], correct: 3 },
            { id: 248, text: "¿Qué institución aprueba el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028)?", options: ["Mesa Sectorial de Sanidad.", "Emakunde.", "Consejo de Administración de Osakidetza.", "Dirección General de Osakidetza."], correct: 2 },
            { id: 249, text: "De acuerdo con el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028), ¿qué concepto define, dentro del diagnóstico de la organización, la dificultad invisible que encuentran las mujeres para acceder a puestos de mayor responsabilidad y toma de decisiones?", options: ["Segregación horizontal.", "Suelo pegajoso.", "Brecha salarial técnica", "Techo de cristal."], correct: 3 },
            { id: 250, text: "Una de las Metas del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028) es \"CORRESPONSABILIDAD\". ¿Cuál es el objetivo específico asociado a esta meta?", options: ["Reducir el porcentaje de hombres en puestos de dirección.", "Reducir a la mitad la brecha de género en investigación.", "Reducir, al menos, en un 2% la brecha de género existente en las medidas de conciliación para cuidados.", "Aumentar el número de investigaciones con perspectiva de género interseccional en un 4%."], correct: 2 },

            // BLOQUE 5
            { id: 251, text: "¿Cuál fue el objetivo del I Plan de Igualdad, teniendo en cuenta su condición de primer plan estratégico de Osakidetza en esta materia?", options: ["Consolidar los avances logrados y profundizar el proceso transformador.", "Establecer unos cimientos sólidos para garantizar el cumplimiento de la legislación y la alineación a los marcos estratégicos.", "Reducir la brecha salarial a la mitad en todas las categorías profesionales.", "Lograr la aprobación por parte del Consejo de Dirección de Osakidetza en julio de 2025."], correct: 1 },
            { id: 252, text: "¿Cuál es la Meta 5 establecida en el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028)?", options: ["Reducir la brecha de género existente en las medidas de conciliación para cuidados.", "Capacitación en Igualdad, garantizando la formación progresiva del personal.", "Igualdad Salarial, con el objetivo de reducir a la mitad las categorías que tienen una brecha retributiva > 5%.", "Investigación, aumentando el número de investigaciones con perspectiva de género."], correct: 2 },
            { id: 253, text: "¿Cuál es el carácter y el propósito fundamental del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028)?", options: ["Es un documento informativo sobre la normativa europea en materia de igualdad sin aplicación directa en la asistencia sanitaria.", "Se define como una guía de recomendaciones de adhesión voluntaria para las diferentes Organizaciones de Servicios.", "Se trata de un reglamento técnico dirigido exclusivamente al personal con funciones de gestión y dirección.", "Es un instrumento estratégico de planificación que busca integrar de forma transversal la perspectiva de género en la cultura y gestión de la organización."], correct: 3 },
            { id: 254, text: "El enfoque de \"interseccionalidad\" mencionado en los fundamentos del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028) implica:", options: ["Analizar cómo el género interactúa con otros factores (edad, origen, discapacidad, orientación sexual, etc.) para identificar formas específicas de discriminación.", "Tratar todas las desigualdades de forma aislada para evitar confusiones estadísticas.", "Fomentar el intercambio de personal entre diferentes centros hospitalarios para equilibrar la plantilla.", "Priorizar la atención sanitaria en las intersecciones de las grandes áreas metropolitanas."], correct: 0 },
            { id: 255, text: "En relación con la violencia machista contra las mujeres, el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028) establece como línea de actuación prioritaria:", options: ["El refuerzo de la prevención, la detección precoz y la mejora de la respuesta asistencial integrada desde el sistema de salud.", "La derivación inmediata de cualquier caso detectado a servicios jurídicos externos, sin intervención del personal sanitario.", "La creación de un registro anónimo donde las personas profesionales puedan denunciar conductas sin seguimiento posterior.", "La limitación de la atención asistencial únicamente a las consecuencias físicas derivadas de la violencia."], correct: 0 },
            { id: 256, text: "Tal y como dispone el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028:", options: ["La rotulación fija, tanto interna como externa, en general ha de estar en las dos lenguas oficiales dando prioridad al euskera.", "Solo la rotulación fija externa en general ha de estar en las dos lenguas oficiales dando prioridad al euskera.", "Solo la rotulación fija interna en general ha de estar en las dos lenguas oficiales dando prioridad al euskera.", "La rotulación fija, tanto interna como externa, debe aparecer únicamente en euskera."], correct: 0 },
            { id: 257, text: "El III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028 establece respecto a los mensajes audiovisuales que:", options: ["Deben emitirse en la lengua que decidan las personas responsable de las unidades que utilizan estos sistemas audiovisuales.", "Deben emitirse en las dos lenguas oficiales, primero en castellano y luego en euskera.", "Deben emitirse en las dos lenguas oficiales, primero en euskera y luego en castellano.", "Deben emitirse en una de las dos lenguas oficiales."], correct: 2 },
            { id: 258, text: "Conforme al III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, respecto a las páginas Web de Osakidetza señale cuál de las siguientes repuestas no es correcta:", options: ["En las intranet, extranet y otros sitios web de Osakidetza las personas usuarias deben tener garantizada la navegación y el acceso a toda la información en las dos lenguas oficiales.", "El personal administrador de los sitios web nunca publicará textos o contenidos que no estén en las dos lenguas oficiales.", "Al acceder por primera vez a una página web de Osakidetza, la página de inicio se mostrará por defecto en euskera.", "Las personas usuarias de los sitios web de Osakidetza deberán tener fácil acceso a los apartados sobre normalización del euskera en la entidad."], correct: 2 },
            { id: 259, text: "De acuerdo con el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, señale la respuesta correcta:", options: ["Por aplicación de la Ley Orgánica de Protección de Datos Personales y garantía de los derechos digitales no puede constar en los datos personales de cada paciente de Osakidetza su idioma de preferencia para las comunicaciones con Osakidetza.", "El signo azul con la letra e indica que la persona paciente no tiene competencia para comunicarse en un idioma que no sea el euskera para las comunicaciones orales con Osakidetza.", "En los datos personales de cada paciente, se registrará su idioma de preferencia para las comunicaciones orales con Osakidetza.", "A las personas que elijan el euskera como lengua prioritaria en sus comunicaciones con Osakidetza solo se les deberá ofrecer servicios en euskera."], correct: 2 },
            { id: 260, text: "En atención al III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, señale la respuesta correcta:", options: ["\"Aukeratu zeure hizkuntza/Elige tu lengua\" es el lema de la campaña de activación del registro de la lengua preferente de cada paciente llevada a cabo en 2017.", "Se atribuye a todas las direcciones y gerencias de Osakidetza la responsabilidad de realizar la campaña con el lema \"Aukeratu zeure hizkuntza/Elige tu lengua\".", "\"Aukeratu zeure hizkuntza/Elige tu lengua\" es el lema de la campaña de activación del registro de la lengua preferente de cada paciente que realizará Osakidetza durante el primer año de planificación.", "\"Aukeratu zeure hizkuntza/Elige tu lengua\" es el lema de la campaña de activación del registro de la lengua preferente de cada paciente que realizará Osakidetza durante el tercer año de planificación."], correct: 2 },
            { id: 261, text: "El III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028 contempla que tanto en los servicios de recepción y admisión, como en las unidades asistenciales y administrativas a toda la ciudadanía vascohablante debe garantizarse:", options: ["La recepción en euskera.", "La recepción en euskera solo cuando la comunicación oral con pacientes y personas usuarias sea de modo presencial.", "La recepción en euskera solo por las y los empleados que sepan en euskera.", "La recepción en euskera solo cuando la comunicación con pacientes y personas usuarias sea telefónicamente."], correct: 0 },
            { id: 262, text: "El III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028 establece que, en los escritos individualizados de respuesta a solicitudes y reclamaciones de pacientes o personas usuarias de Osakidetza se utilizará:", options: ["La lengua utilizada por cada ciudadano o ciudadana.", "Siempre el euskera como lengua preferente.", "Siempre las dos lenguas oficiales independientemente de la lengua utilizada por cada ciudadano o ciudadana.", "Ambas lenguas oficiales, siendo los escritos contestados primero en euskera y luego en castellano."], correct: 0 },
            { id: 263, text: "Siguiendo lo previsto en el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, señale la respuesta que no es correcta:", options: ["Se pondrá a disposición del personal bilingüe que lo desee diferentes elementos identificativos portadores del circulo azul con la letra e, signo que invita a relacionarse en euskera.", "El signo azul y la letra e solo se utilizará para la identificación individual del personal bilingüe.", "En los centros de salud, consultorios y unidades hospitalarias, deberá estar colocado, de modo visible, el cartel que explica a las personas usuarias el significado del signo identificativo con la letra e.", "Se estudiará introducir una variante del círculo azul con la letra e para el personal dispuesto a que le hablen en euskera pero que muestra dificultades para expresarse en ciertas situaciones."], correct: 1 },
            { id: 264, text: "En atención a lo previsto en el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, en todos los centros de atención primaria ha de ponerse en marcha un procedimiento para que, en la medida de las posibilidades, se propongan servicios en euskera a las personas pacientes que hayan registrado esta lengua como preferente y que aún reciban los citados servicios en castellano. Señale a qué servicios se refiere el citado Plan:", options: ["Medicina familiar, pediatría, enfermería y salud mental.", "Pediatría, medicina familiar y salud mental.", "Medicina familiar, pediatria, enfermería y matrona.", "Todas las anteriores respuestas son correctas."], correct: 2 },
            { id: 265, text: "Conforme al III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, con relación a las quejas relacionadas con el uso de las lenguas oficiales en Osakidetza, señale la respuesta que no es correcta:", options: ["La dirección responsable de las acciones previstas con relación a las quejas relaciones con el uso de las lenguas oficiales en Osakidetza es la Dirección de Recursos Humanos.", "En los Servicios de Atención a Pacientes y personas Usuarias (SAPU) quedarán registradas las quejas relacionadas con el uso de las lenguas oficiales.", "Las quejas relacionadas con el uso de las lenguas oficiales serán gestionadas por el SAPU y por la persona o personas responsables del servicio objeto de la queja.", "Para mejorar la gestión y seguimiento de las quejas, Osakidetza acordará un protocolo con las entidades que trabajan en el ámbito de los derechos lingüísticos."], correct: 0 },
            { id: 266, text: "Conforme al III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, en las relaciones con empresas proveedoras, entidades financieras y organismos privados:", options: ["Se designarán interlocutores o interlocutoras vasco-hablantes y se notificará el deseo de Osakidetza de relacionarse en euskera.", "En la comunicación escrita siempre debe utilizarse las dos lenguas oficiales.", "Osakidetza solicitará a las entidades proveedoras que sus productos que tengan como personas destinatarias a profesionales de Osakidetza estén en euskera.", "Ninguna de las anteriores respuestas es correcta."], correct: 0 },
            { id: 267, text: "Conforme al III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, la Dirección General de Osakidetza realizará una comunicación interna de cara a conocer el registro de la lengua preferente de cada profesional, explicar el modo de registrar la lengua preferente y animar al personal vascohablante a optar por el euskera:", options: ["Una vez cada seis meses.", "Una vez al año.", "Cada vez que haya una nueva contratación.", "El III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2018 no contempla esta acción."], correct: 1 },
            { id: 268, text: "Conforme al III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028:", options: ["En los casos de los mensajes SMS que se envían a los teléfonos móviles de personas trabajadoras o candidatas, estarán escritos en las dos lenguas oficiales, primero en castellano y luego en euskera.", "Los escritos individualizados de respuesta a solicitudes y reclamaciones de las personas trabajadoras deberán redactarse en las dos lenguas oficiales.", "Osakidetza ha de garantizar que la información y los servicios ofrecidos tanto al personal empleado como a personas candidatas a través de las tecnologías de la comunicación estén en las dos lenguas oficiales, con el fin de que cada persona haga uso de la lengua de su preferencia.", "Las informaciones y comunicaciones no personalizadas dirigidas al personal deberán redactarse en las dos lenguas oficiales y se dará prioridad al castellano."], correct: 2 },
            { id: 269, text: "Como contempla el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028:", options: ["En puestos de Jefatura y responsabilidad, en los servicios de prioridad 2, se asignará fecha de preceptividad siempre que el porcentaje de fechas mínimas del servicio sea el 40% o superior.", "En puestos de Jefatura y responsabilidad, en los servicios de prioridad 2, se asignará fecha de preceptividad siempre que el porcentaje de fechas mínimas del servicio sea el 50% o superior.", "En los servicios de prioridad 2 se asignará fecha de preceptividad a los puestos vacantes por jubilación, incapacidad absoluta o fallecimiento de la persona titular cuando el porcentaje mínimo de fechas de preceptividad que corresponde al servicio sea el 50% o superior.", "Osakidetza realizará al menos una convocatoria anual de acreditación de perfiles lingüísticos de acuerdo a lo establecido en el Decreto 67/2003."], correct: 1 },
            { id: 270, text: "De acuerdo con el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, Osakidetza realizará dos evaluaciones generales del plan de euskera:", options: ["La primera el tercer año del período de planificación y la segunda el sexto año.", "La primera el segunda año del período de planificación y la segunda el sexto año.", "La primera el tercer año del período de planificación y la segunda el sexto año, y será una evaluación cualitativa.", "La primera el segunda año del período de planificación y la segunda el sexto año, y será una evaluación cuantitativa fundamentada en los indicadores del plan."], correct: 1 },
            { id: 271, text: "¿Cuál es la vigencia temporal del Plan Oncológico Integral de Euskadi (PΟΙΕ) al que se refiere el documento?", options: ["2024-2028", "2025-2030", "2023-2027", "2020-2025"], correct: 1 },
            { id: 272, text: "Según el Resumen Ejecutivo del Plan Oncológico Integral de Euskadi (POIE) 2025-2030 de qué porcentaje de los fallecimientos en Euskadi fue responsable el cáncer en el año 2023?", options: ["22,3%", "Menos del 15%", "33,8%", "28%"], correct: 3 },
            { id: 273, text: "Según el Resumen Ejecutivo del Plan Oncológico Integral de Euskadi (POIE) 2025-2030, ¿cuáles fueron las dos localizaciones de cáncer más frecuentes en Euskadi en el periodo 2015-2019, consideradas separadamente por sexo?", options: ["Cáncer colorrectal y cáncer de pulmón.", "Cáncer de mama en mujeres y cáncer de próstata en hombres.", "Cáncer de páncreas y cáncer de pulmón.", "Leucemia y Linfoma de Hodgkin."], correct: 1 },
