    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATOS: BLOQUES 1 a 5 (Preguntas literales del PDF) ---
        const allQuestions = [
            // BLOQUE 1
            { id: 1, text: "De acuerdo con las normas generales de ordenación de las profesiones sanitarias, para poder ejercer una profesión sanitaria será requisito imprescindible:", options: ["La colegiación, cuando una ley estatal establezca esta obligación para el ejercicio de una profesión titulada o algunas actividades propias de ésta.", "La inexistencia de inhabilitación o suspensión para el ejercicio profesional por sentencia judicial, aunque no sea firme, durante el periodo de tiempo que fije ésta; por resolución sancionadora impuesta por un colegio profesional sanitario, cuando una ley estatal establezca para este ejercicio la obligación de pertenecer al colegio profesional respectivo durante el periodo de tiempo que fije ésta; o por resolución administrativa sancionadora firme, durante el periodo de tiempo que fije ésta, cuando se ejerza la profesión en el ámbito de la asistencia sanitaria pública.", "Tener suscrito y vigente un seguro de responsabilidad, un aval u otra garantía financiera, ya sean de protección personal o colectiva, que cubra las indemnizaciones que se puedan derivar de la responsabilidad profesional por un eventual daño a las personas, causado con ocasión de la prestación de tal asistencia o servicios, cuando se ejerza la profesión en el ámbito de la asistencia sanitaria pública.", "Todo lo anterior."], correct: 0 },
            { id: 2, text: "Según lo establecido en la normativa vigente sobre ordenación de las profesiones sanitarias, para poder ejercer una profesión sanitaria:", options: ["Se ha de tener suscrito y vigente un seguro de responsabilidad que cubra las indemnizaciones que se puedan derivar de la responsabilidad profesional por un eventual daño a las personas causado con ocasión de la prestación de tal asistencia o servicios cuando se ejerza la profesión en el ámbito de la asistencia sanitaria privada, no siendo suficiente un aval u otra garantía financiera de protección colectiva.", "Se ha de tener suscrito y vigente un seguro de responsabilidad, un aval u otra garantía financiera, sean de protección personal o colectiva, que cubra las indemnizaciones que se puedan derivar de la responsabilidad profesional por un eventual daño a las personas causado con ocasión de la prestación de tal asistencia o servicios cuando se ejerza la profesión en el ámbito de la asistencia sanitaria privada.", "Se ha de tener suscrito y vigente un seguro de responsabilidad, un aval u otra garantía financiera, sean de protección personal o colectiva, que cubra las indemnizaciones que se puedan derivar de la responsabilidad profesional por un eventual daño a las personas causado con ocasión de la prestación de tal asistencia o servicios cuando se ejerza la profesión en el ámbito de la asistencia sanitaria pública.", "Todas las opciones son falsas."], correct: 1 },
            { id: 3, text: "Con la finalidad de facilitar la observancia de los requisitos previstos en la normativa vigente para ejercer las profesiones sanitarias (señálese la afirmación que sea falsa):", options: ["Los juzgados y tribunales deberán remitir aquellos datos necesarios referentes a las sentencias firmes de inhabilitación o suspensión para el ejercicio profesional al Ministerio de Sanidad, Servicios Sociales e Igualdad en la forma que reglamentariamente se establezca.", "Las administraciones públicas con competencias sancionadoras sobre el personal sanitario a su servicio deberán remitir las resoluciones sancionadoras que afecten a la situación de suspensión o habilitación de dicho personal.", "Las corporaciones colegiales deberán remitir al Ministerio de Sanidad, Servicios Sociales e Igualdad copia de las resoluciones sancionadoras que suspendan o inhabiliten para el ejercicio profesional impuestas por ellos, cuando una ley estatal establezca para este ejercicio la obligación de colegiación siempre que la persona colegiada no se oponga explícitamente.", "El Ministerio de Sanidad, Servicios Sociales e Igualdad comunicará a las entidades mencionadas en las opciones b) y c) anteriores, las resoluciones sancionadoras que reciba."], correct: 2 },
            { id: 4, text: "Según la normativa vigente, el órgano encargado del Registro Estatal de Profesionales Sanitarios podrá (indíquese la que sea correcta):", options: ["Consultar los datos de carácter personal de la población profesional sanitaria contenidos en los archivos y ficheros del Documento Nacional de Identidad (DNI) y del Número de Identidad de Extranjero (NIE) competencia del Ministerio del Interior, para contrastar la veracidad de la información que consta en el registro.", "Consultar los datos de carácter personal de la población profesional sanitaria contenidos en los archivos y ficheros del Documento Nacional de Identidad (DNI) y del Número de Identidad de Extranjero (NIE) competencia del Ministerio del Interior, para contrastar la veracidad de la información que consta en el registro, pero solo si la persona titular no se ha opuesto explícitamente.", "Consultar los datos de carácter personal de los profesionales sanitarios contenidos en los archivos y ficheros del Documento Nacional de Identidad (DNI) y del Número de Identidad de Extranjero (NIE) competencia del Ministerio del Interior, para contrastar la veracidad de la información que consta en el registro, pero solo si la persona titular de los datos da su consentimiento expreso.", "Solo podrá consultar los datos de carácter personal de la población profesional sanitaria contenidos en los archivos y ficheros del Documento Nacional de Identidad (DNI) y del Número de Identidad de Extranjero (NIE) en el curso de una investigación sobre una infracción administrativa."], correct: 0 },
            { id: 5, text: "En el marco de la ordenación de las profesiones sanitarias, las personas pacientes:", options: ["Tienen derecho a la libre elección del personal facultativo que debe atenderles, tanto si su ejercicio profesional se desarrolla en el sistema público como en el ámbito privado.", "Tienen derecho a la libre elección del personal facultativo que debe atenderles, pero solo si su ejercicio profesional se desarrolla en el sistema público.", "Tienen derecho a la libre elección del personal facultativo que debe atenderles, pero solo si su ejercicio profesional se desarrolla en el ámbito privado.", "Ninguna de las anteriores es correcta."], correct: 0 },
            { id: 6, text: "Según la normativa de ordenación de las profesiones sanitarias, el personal profesional y las personas responsables de los centros sanitarios facilitarán a sus pacientes el ejercicio del derecho a conocer:", options: ["El nombre, la titulación, la especialidad y la hoja de servicios del personal sanitario que les atiende, así como la categoría y función de dicho personal, si así estuvieran definidas en su centro o institución.", "El nombre, la titulación y la especialidad del personal sanitario que les atiende y su categoría, pero no su función en su centro o institución.", "El nombre, la titulación y la especialidad del personal sanitario que les atiende, así como la categoría y función de dicho personal, si así estuvieran definidas en su centro o institución.", "El nombre, la titulación y la especialidad del personal sanitario que les atiende, pero no su categoría y función en su centro o institución."], correct: 2 },
            { id: 7, text: "De acuerdo con las normas generales de ordenación de las profesiones sanitarias, el ejercicio del derecho del personal profesional sanitario a la renuncia a la atención a una persona paciente queda condicionado a que (señálese la respuesta incorrecta):", options: ["Su renuncia no conlleve desatención de la persona paciente.", "La renuncia se ejerza de acuerdo con procedimientos regulares.", "Quede constancia, aunque no sea formal, de la renuncia.", "La renuncia se ejerza de acuerdo con procedimientos establecidos y explícitos."], correct: 2 },
            { id: 8, text: "De acuerdo con las normas generales de ordenación de las profesiones sanitarias, las personas pacientes tienen derecho a recibir información de acuerdo con lo establecido en:", options: ["La Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de los derechos y obligaciones en materia de información y documentación clínica.", "La Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas.", "El Código Civil vigente.", "Ninguna de las anteriores."], correct: 0 },
            { id: 9, text: "De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, corresponde al personal con la titulación de Licenciatura o Grado en Medicina la indicación y realización de las actividades dirigidas a (señálese la respuesta incorrecta):", options: ["La promoción y mantenimiento de la salud de las personas pacientes.", "La dispensación de los medicamentos a las personas pacientes.", "La prevención de las enfermedades y al diagnóstico, tratamiento, terapéutica y rehabilitación de las personas pacientes.", "El enjuiciamiento y pronóstico de los procesos objeto de atención."], correct: 1 },
            { id: 10, text: "Los centros sanitarios revisarán que el personal sanitario de su plantilla cumple los requisitos necesarios para ejercer la profesión conforme a lo previsto en la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias y en las demás normas aplicables:", options: ["Cada cinco años como mínimo.", "Cada tres años como mínimo.", "Cada dos años como mínimo.", "Cada cuatro años como mínimo."], correct: 1 },
            { id: 11, text: "Según dispone la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, cuando una actuación sanitaria se realice por un equipo de profesionales (señálese la respuesta incorrecta):", options: ["Se articulará, preferentemente, de forma jerarquizada atendiendo a los criterios de conocimientos y competencia y, en su caso, al de titulación del personal profesional que integra el equipo, en función de la actividad concreta a desarrollar, de la confianza y conocimiento recíproco de las capacidades de quienes forman el equipo, y de los principios de accesibilidad y continuidad asistencial de las personas atendidas.", "Se articulará de forma jerarquizada o colegiada, atendiendo a los criterios de conocimientos y competencia y, en su caso, al de titulación del personal profesional que integra el equipo, en función de la actividad concreta a desarrollar, de la confianza y conocimiento recíproco de las capacidades de quienes forman el equipo, y de los principios de accesibilidad y continuity asistencial de las personas atendidas.", "Se articulará de forma preferentemente colegiada, atendiendo a los criterios de conocimientos y competencia y, en su caso, al de titulación del personal profesional que integra el equipo, en función de la actividad concreta a desarrollar, de la confianza y conocimiento reciproco de las capacidades de quienes forman el equipo, y de los principios de accesibilidad y continuidad asistencial de las personas atendidas.", "Ninguna de las anteriores es correcta."], correct: 3 },
            { id: 12, text: "A los efectos de la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias tienen la consideración de funciones de gestión clínica (señálese la respuesta incorrecta):", options: ["Las relativas a la jefatura o coordinación de unidades y equipos sanitarios y asistenciales.", "Las de tutorías y organización de formación especializada, continuada y de investigación.", "Las de creación y difusión de contenidos a través de las redes sociales gestionadas por la unidad correspondiente.", "Las de participación en comités internos o proyectos institucionales de los centros sanitarios dirigidos, entre otros, a asegurar la calidad, seguridad, eficacia, eficiencia y ética asistencial, la continuidad y coordinación entre niveles o el acogimiento, cuidados y bienestar de las personas pacientes."], correct: 2 },
            { id: 13, text: "De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, el ejercicio de funciones de gestión clínica estará sometido a una evaluación del desempeño y de los resultados que tendrá lugar:", options: ["Anualmente.", "Cada dos años.", "Cada cuatro años.", "La Ley no lo determina explícitamente."], correct: 3 },
            { id: 14, text: "De acuerdo con la normativa vigente de ordenación de las profesiones sanitarias, el reconocimiento del desempeño de funciones de gestión clínica:", options: ["Se evaluará cuidadosamente cada dos años, de acuerdo con lo dispuesto en la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias.", "Será objeto del oportuno reconocimiento por parte del centro, del servicio de salud y del conjunto del sistema sanitario, en la forma en que en cada comunidad autónoma se determine.", "Se realizará siempre por parte del Ministerio de Sanidad.", "Todas las anteriores son incorrectas."], correct: 1 },
            { id: 15, text: "Según la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, señale cuál de estas afirmaciones es incorrecta:", options: ["Los equipos de profesionales, una vez constituidos y aprobados en el seno de organizaciones o instituciones sanitarias, serán reconocidos y apoyados, y sus actuaciones facilitadas, por los órganos directivos y gestores de las mismas.", "La responsabilidad de la capacidad del personal profesional para realizar una correcta actuación, en las tareas y funciones que les sean encomendadas en el proceso de distribución del trabajo en equipo, recaerá sobre los centros e instituciones en los que desempeñen su actividad.", "Dentro de un equipo de profesionales, será posible la delegación de actuaciones si las condiciones bajo las que se producirá tal delegación están previamente establecidas dentro del equipo.", "La responsabilidad de un equipo de profesionales recaerá en aquellas personas integrantes que hayan adquirido las tareas y funciones que hayan causado la responsabilidad, siempre que las condiciones de la delegación se adecúen a lo establecido."], correct: 3 },
            { id: 16, text: "Quien ostente la titularidad de los centros sanitarios y los servicios de salud podrá formalizar convenios y conciertos con el Instituto de Salud Carlos III, con otros centros de investigación, públicos o privados, y con otras instituciones que tengan interés en la investigación sanitaria, para (señálese la respuesta incorrecta):", options: ["El desarrollo de programas de investigación.", "La designación de la tutoría de la investigación.", "La dotación de plazas vinculadas o específicas de investigación, en los establecimientos sanitarios.", "El establecimiento de sistemas específicos de formación de personal investigador durante el período inmediatamente anterior a la obtención del título de especialista."], correct: 3 },
            { id: 17, text: "De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, diga cuál de los siguientes principios generales de la relación entre las personas que ejercen profesiones sanitarias y las personas atendidas no es tal:", options: ["El personal profesional tiene el deber de hacer un uso racional de los recursos diagnósticos y terapéuticos a su cargo, tomando en consideración, entre otros, los costes de sus decisiones y evitando la sobreutilización, la infrautilización y la inadecuada utilización de los mismos.", "El personal profesional tiene el deber de prestar una atención sanitaria técnica y profesional adecuada a las necesidades de salud de las personas que atiende, de acuerdo con el estado de desarrollo de los conocimientos científicos de cada momento y con los niveles de calidad y seguridad que se establecen en esta ley y el resto de normas legales y deontológicas aplicables.", "El personal profesional tiene el deber de proporcionar a las personas pacientes información precisa sobre su formación profesional, la forma en que han actualizado sus conocimientos y las demandas de responsabilidad que hayan podido derivar en responsabilidades administrativas.", "El personal profesional tiene el deber de respetar la personalidad, dignidad e intimidad de las personas a su cuidado y debe respetar su participación en las tomas de decisiones que les afecten. En todo caso, deben ofrecer una información suficiente y adecuada para que puedan ejercer su derecho al consentimiento sobre dichas decisiones."], correct: 2 },
            { id: 18, text: "De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, la eficacia organizativa de los servicios, secciones y equipos, o unidades asistenciales equivalentes sea cual sea su denominación, requerirá (señálese la que sea incorrecta):", options: ["La existencia escrita de normas de funcionamiento interno.", "La definición de objetivos y funciones tanto generales como específicas para cada persona perteneciente al mismo.", "La cumplimentación por parte del personal profesional de la documentación asistencial, informativa o estadística que determine el centro.", "La realización de controles periódicos sobre la eficiencia del personal profesional sanitario."], correct: 3 },
            { id: 19, text: "De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, señálese la afirmación incorrecta:", options: ["Los centros sanitarios acreditados para la formación especializada deberán contar con una comisión de docencia.", "Los centros sanitarios acreditados para la formación especializada deberán contar con jefaturas de estudios y con la coordinación docente que resulten adecuados en función de su capacidad docente.", "Los centros sanitarios acreditados para la formación especializada deberán contar con el personal tutor de la formación que resulte adecuado en función de su capacidad docente.", "Los centros sanitarios acreditados para la formación especializada deberán contar con jefaturas de estudios, coordinación docente y personal tutor de la formación que resulten adecuados en función de su capacidad docente, pero no con una comisión de docencia."], correct: 3 },
            { id: 20, text: "De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, los centros sanitarios acreditados para desarrollar programas de formación continuada:", options: ["Deberán contar con jefaturas de estudios, con la coordinación docente y con el personal tutor de la formación que resulten adecuados en función de las actividades a desarrollar, así como con una figura de defensoría del alumnado.", "Deberán contar una comisión de docencia, así como con jefaturas de estudios, coordinación docente y personal tutor de la formación que resulten adecuados en función de las actividades a desarrollar.", "Deberán contar una comisión de docencia y con una figura de defensoría del alumnado, así como con jefaturas de estudios, coordinación docente y personal tutor de la formación que resulten adecuados en función de las actividades a desarrollar.", "Todas las anteriores son incorrectas."], correct: 3 },
            { id: 21, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, sus disposiciones se aplicarán a:", options: ["A los servicios sanitarios de financiación pública y a los privados, en los mismos términos.", "A los servicios sanitarios de financiación pública. También a los privados en lo que se refiere al control de las actividades de salud pública y en materia de garantías de información, seguridad y calidad.", "A los servicios sanitarios de financiación pública y a los privados concertados.", "Únicamente a los servicios sanitarios de financiación pública."], correct: 1 },
            { id: 22, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, para hacer efectivo el derecho a la protección de la salud y a la atención sanitaria, las personas titulares de los mismos deberán:", options: ["Tener nacionalidad española y residencia habitual en el territorio español.", "Tener reconocido su derecho a la asistencia sanitaria en España por cualquier otro título jurídico, aun no teniendo su residencia habitual en territorio español, siempre que no exista un tercero obligado al pago de dicha asistencia.", "Ser persona extranjera y con residencia legal y habitual en el territorio español y no tener la obligación de acreditar la cobertura obligatoria de la prestación sanitaria por otra vía.", "Todas las respuestas anteriores son correctas."], correct: 3 },
            { id: 23, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la ciudadanía tendrá los siguientes derechos en el conjunto del Sistema Nacional de Salud:", options: ["A recibir asistencia sanitaria en su comunidad autónoma de residencia.", "A recibir el reembolso de los gastos derivados de la asistencia en la sanidad privada cuando se trate de servicios recogidos en el catálogo de prestaciones del Sistema Nacional de Salud.", "A recibir el reembolso de los gastos derivados de la asistencia sanitaria del catálogo de prestaciones del Sistema Nacional de Salud que pudiera requerir del servicio de salud de la comunidad autónoma en la que se encuentre desplazado/a.", "Ninguna de las respuestas anteriores es correcta."], correct: 3 },
            { id: 24, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la cartera común de servicios del Sistema Nacional de Salud se articula en torno a las siguientes modalidades:", options: ["Cartera común básica de servicios asistenciales, cartera común suplementaria y cartera común de servicios accesorios.", "Cartera común básica nacional de servicios asistenciales y cartera común autonómica de servicios asistenciales.", "Cartera común nacional básica de servicios asistenciales, cartera común suplementaria autonómica y cartera común de servicios accesorios autonómicos.", "Cartera común nacional y autonómica básica de servicios asistenciales, cartera común nacional y autonómica suplementaria y cartera común nacional y autonómica de servicios accesorios."], correct: 0 },
            { id: 25, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la cartera común básica de servicios asistenciales del Sistema Nacional de Salud:", options: ["Se acordará en el seno del Consejo Interterritorial del Sistema Nacional de Salud y se aprobará en la Ley General de Presupuestos del Estado.", "Se acordará en el seno del Consejo Interterritorial del Sistema Nacional de Salud y se aprobará mediante Real Decreto.", "Se acordará en el seno del Consejo Interterritorial del Sistema Nacional de Salud y se aprobará en las normas autonómicas correspondientes.", "Se acordará en el seno de la Conferencia de Presidentes de las Comunidades Autónomas y se aprobará en las normas autonómicas correspondientes"], correct: 1 },
            { id: 26, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la cartera común básica de servicios asistenciales del Sistema Nacional de Salud comprende:", options: ["Todas las actividades asistenciales de prevención, diagnóstico, tratamiento y rehabilitación que se realicen en centros sanitarios o sociosanitarios, así como el transporte sanitario urgente, la prestación farmacéutica y la prestación ortoprotésica, cubiertos de forma completa por financiación pública.", "Todas las actividades asistenciales de prevención, diagnóstico, tratamiento y rehabilitación que se realicen en centros sanitarios o sociosanitarios, así como el transporte sanitario urgente y la prestación farmacéutica, cubiertos de forma completa por financiación pública.", "Todas las actividades asistenciales de prevención, diagnóstico, tratamiento y rehabilitación que se realicen en centros sanitarios o sociosanitarios, así como el transporte sanitario urgente, y la prestación ortoprotésica, cubiertos de forma completa por financiación pública.", "Todas las actividades asistenciales de prevención, diagnóstico, tratamiento y rehabilitación que se realicen en centros sanitarios o sociosanitarios, así como el transporte sanitario urgente, cubiertos de forma completa por financiación pública."], correct: 3 },
            { id: 27, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la cartera común suplementaria del Sistema Nacional de Salud incluirá las siguientes prestaciones:", options: ["Únicamente la prestación farmacéutica.", "Únicamente la prestación ortoprotésica.", "Únicamente la prestación farmacéutica y la prestación ortoprotésica.", "La prestación farmacéutica, la prestación ortoprotésica y la prestación con productos dietéticos."], correct: 3 },
            { id: 28, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la cartera común de servicios accesorios del Sistema Nacional de Salud incluye:", options: ["Todas aquellas actividades, servicios o técnicas, sin carácter de prestación, que no se consideran esenciales y/o que son coadyuvantes o de apoyo para la mejora de una patología de carácter crónico, estando sujetas a aportación y/o reembolso por parte de la persona usuaria.", "Todas aquellas actividades, servicios o técnicas, sin carácter de prestación, que no se consideran esenciales y/o que son coadyuvantes o de apoyo para la mejora de una patología de carácter crónico, estando sujetas siempre a aportación de la persona usuaria.", "Todas aquellas actividades, servicios o técnicas, sin carácter de prestación, que no se consideran esenciales y/o que son coadyuvantes o de apoyo para la mejora de una patología de carácter crónico, estando sujetas a siempre a reembolso por parte de la persona usuaria.", "Todas aquellas actividades, servicios o técnicas, sin carácter de prestación, que no se consideran esenciales y/o que son coadyuvantes o de apoyo para la mejora de una patología de carácter crónico, pero también cubiertos de forma completa por financiación pública."], correct: 0 },
            { id: 29, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, las comunidades autónomas, en el ámbito de sus competencias, podrán aprobar sus respectivas carteras de servicios que incluirán, cuando menos:", options: ["La cartera común de servicios del Sistema Nacional de Salud en su modalidad básica de servicios asistenciales.", "La cartera común de servicios del Sistema Nacional de Salud en sus modalidades básica de servicios asistenciales y suplementaria.", "La cartera común de servicios del Sistema Nacional de Salud en sus modalidades básica de servicios asistenciales, suplementaria y de servicios accesorios.", "Ninguna de las respuestas anteriores es correcta."], correct: 2 },
            { id: 30, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, las comunidades autónomas, podrán incorporar en sus carteras de servicios una técnica, tecnología o procedimiento no contemplado en la cartera común de servicios del Sistema Nacional de Salud. Con anterioridad a su incorporación, la comunidad autónoma concernida deberá informar, de forma motivada, al Consejo Interterritorial del Sistema Nacional de Salud:", options: ["Esta afirmación es correcta.", "Esta afirmación es correcta, salvo en lo que se refiere a la obligación de informar.", "Esta afirmación es correcta, salvo en lo que se refiere a que la información deberá ser motivada.", "Esta afirmación es falsa."], correct: 0 },
            { id: 31, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la prestación de atención primaria no comprenderá:", options: ["La atención a la salud bucodental.", "La atención paliativa a personas enfermas terminales.", "La rehabilitación básica.", "Ninguna de las respuestas anteriores es correcta."], correct: 3 },
            { id: 32, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, para la elaboración del contenido de la cartera común de servicios del Sistema Nacional de Salud:", options: ["Es preceptivo el informe favorable de la Red Española de Agencias de Evaluación de Tecnologías Sanitarias y Prestaciones del Sistema Nacional de Salud...", "Se contará con la participación de la Red Española de Agencias de Evaluación de Tecnologias Sanitarias y Prestaciones del Sistema Nacional de Salud, en la evaluación de la eficacia...", "Es preceptivo el informe favorable de las sociedades científicas implicadas...", "Se contará con la participación de las sociedades científicas implicadas..."], correct: 1 },
            { id: 33, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la exclusión de una técnica, tecnología o procedimiento actualmente incluido en la cartera de servicios se llevará a cabo cuando:", options: ["Se evidencie su falta de eficacia, efectividad o eficiencia, o que el balance entre beneficio y riesgo sea significativamente desfavorable.", "Requiera una formación para la que no exista la especialidad médica correspondiente.", "Hayan cambiado las condiciones económicas de su implantación.", "Todas las respuestas anteriores son correctas."], correct: 0 },
            { id: 34, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, los servicios de referencia:", options: ["Serán designados en el seno del Consejo Interterritorial del Sistema Nacional de Salud y acreditados por el Ministerio de Sanidad y Consumo.", "Serán designados en el seno del Consejo Interterritorial del Sistema Nacional de Salud y acreditados por la autoridad correspondiente de la Comunidad Autónoma donde se ubiquen.", "Serán designados y acreditados en el seno del Consejo Interterritorial del Sistema Nacional de Salud.", "Serán designados en el seno del Consejo Interterritorial del Sistema Nacional de Salud, acreditados por el Ministerio de Sanidad y Consumo y financiados por la Comunidad Autónoma donde se ubiquen."], correct: 0 },
            { id: 35, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la decisión sobre la financiación de los medicamentos de uso humano y veterinario corresponde:", options: ["Al Consejo Interterritorial del Sistema Nacional de Salud.", "Al Ministerio de Sanidad y Consumo.", "A cada Comunidad Autónoma.", "Al Ministerio de Economía y Hacienda."], correct: 1 },
            { id: 36, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, el diseño de programas de formación y modernización de los recursos humanos del Sistema Nacional de Salud corresponde:", options: ["A la Comisión de Recursos Humanos del Sistema Nacional de Salud, sin perjuicio de las competencias de las comunidades autónomas.", "Al Ministerio de Educación, sin prejuicio de las competencias de las comunidades autónomas.", "A las comunidades autónomas, sin perjuicio de las competencias del Ministerio de Educación.", "A las comunidades autónomas, sin perjuicio de las competencias de la Comisión de Recursos Humanos del Sistema Nacional de Salud."], correct: 0 },
            { id: 37, text: "A los efectos de la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la competencia profesional es:", options: ["La acreditación de formación continuada a lo largo del desempeño de su carrera profesional.", "La competencia acreditada por el título correspondiente acreditativo de la adquisición de conocimientos requeridos para el desempeño del puesto designado.", "La aptitud del personal profesional sanitario para integrar y aplicar los conocimientos, habilidades y actitudes asociados a las buenas prácticas de su profesión para resolver los problemas que se le plantean.", "La superación del proceso selectivo oficial convocado por la autoridad competente para la adquisición del vínculo estatutario con los servicios sanitarios."], correct: 2 },
            { id: 38, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la tarjeta sanitaria individual incluirá los siguientes datos:", options: ["Exclusivamente los datos básicos de identificación de la persona titular de la tarjeta.", "Exclusivamente los datos básicos de identificación de la persona titular de la tarjeta y del derecho que le asiste en relación con la prestación farmacéutica.", "Los datos básicos de identificación de la persona titular de la tarjeta, del derecho que le asiste en relación con la prestación farmacéutica y del servicio de salud o entidad responsable de la asistencia sanitaria.", "Los datos básicos de identificación de la persona titular de la tarjeta, del derecho que le asiste en relación con la prestación farmacéutica, del servicio de salud o entidad responsable de la asistencia sanitaria y del personal profesional al que está adscrito en atención primaria."], correct: 2 },
            { id: 39, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la infraestructura para la mejora de la calidad del Sistema Nacional de Salud estará constituida por los elementos siguientes:", options: ["El registro de agresiones a profesionales de la sanidad, con el fin de adopción de medidas preventivas.", "El registro de acontecimientos adversos, que recogerá información sobre aquellas practices que hayan resultado un problema potencial de seguridad para la persona paciente.", "Las respuestas a) y b) son correctas.", "Las respuestas a) y b) son falsas."], correct: 1 },
            { id: 40, text: "Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la declaración de actuaciones coordinadas en salud pública y en seguridad alimentaria deberán encuadrarse en alguno de los supuestos siguientes:", options: ["Responder a situaciones de especial riesgo o alarma para la salud pública.", "Establecer planes preventivos para hacer frente a situaciones de especial riesgo o alarma para la salud pública.", "Realizar análisis epidemiológicos que permitan establecer estructuras y recursos según las previsiones en materia de salud pública y seguridad alimentaria.", "Las respuestas a) y b) son verdaderas y la c) es falsa."], correct: 3 },
            { id: 41, text: "El objeto de la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud es:", options: ["Establecer las bases reguladoras de la relación funcionarial especial del personal estatutario de los servicios de salud que conforman el Sistema Nacional de Salud.", "Establecer el Estatuto Marco del personal estatutario vinculado por una relación laboral especial a los servicios de salud que integran el Sistema Nacional de Salud.", "Ninguna de las anteriores respuestas es correcta.", "Establecer las bases reguladoras de la relación funcionarial del personal estatutario de los servicios de salud que conforman el Sistema Nacional de Salud."], correct: 0 },
            { id: 42, text: "Según dispone la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, la ordenación del régimen personal estatutario de los servicios de salud se rige por una serie de principios y criterios. Señale cuales no están entre los mencionados por esta ley:", options: ["Sometimiento pleno a la ley y el derecho.", "Igualdad, mérito, capacidad y promoción en el acceso a la condición de personal estatutario.", "Integración en el régimen organizativo y funcional del servicio de salud y de sus centros e instituciones.", "Coordinación, cooperación y mutua información entre las Administraciones sanitarias públicas."], correct: 1 },
            { id: 43, text: "El personal estatutario de los servicios de salud que conforman el Sistema Nacional de Salud:", options: ["No ostenta el derecho individual a la libre sindicación.", "Ostenta el derecho a la actividad sindical.", "Ostenta el derecho de reunión, que podrá ejercerlo siempre que cuente con la necesaria autorización previa.", "Todas las respuestas son correctas."], correct: 1 },
            { id: 44, text: "La condición de personal estatutario fijo se adquiere, tal y como prevé la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, por el cumplimiento de los siguientes requisitos:", options: ["Incorporación a una plaza de servicio, institución o centro que corresponda en el plazo fijado en la convocatoria tras la superación de las pruebas de selección.", "Superación de las pruebas de selección; nombramiento conferido por el órgano competente; e incorporación a una plaza del servicio, institución o centro que corresponda en el plazo de un mes.", "Superación de las pruebas de selección; nombramiento conferido por el órgano competente; e incorporación, previo cumplimiento de los requisitos formales en cada caso establecidos, a una plaza del servicio, institución o centro que corresponda en el plazo determinado en la convocatoria.", "Superación de las pruebas de selección; nombramiento conferido por el órgano competente; e incorporación a una plaza del servicio, institución o centro que corresponda en todo caso en el plazo determinado en la convocatoria."], correct: 2 },
            { id: 45, text: "Según dice la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, en el proceso de la adquisición de la condición de personal estatutario fijo, no podrán recibir nombramiento y quedarán sin efecto las actuaciones de quienes:", options: ["No acrediten que reúnen los requisitos y condiciones exigidos en la convocatoria, una vez superado el proceso selectivo.", "No acrediten que reúnen los requisitos y condiciones exigidos en la convocatoria, con carácter previo a la superación del proceso selectivo.", "No acrediten que reúnen los requisitos y condiciones exigidos en la convocatoria, una vez firmada la convocatoria.", "Una vez superado el proceso selectivo, automáticamente se procede al nombramiento por el órgano competente."], correct: 0 },
            { id: 46, text: "La pérdida de la condición de personal estatutario regulada en la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, se produce:", options: ["Siempre en caso de pena de inhabilitación especial para empleo o cargo público, afecte o no al correspondiente nombramiento.", "En caso de que se adopte la pena de inhabilitación absoluta sea firme o no.", "En caso de que se adopte la pena de inhabilitación especial para la correspondiente profesión, siempre que esta exceda de seis años.", "En caso de que se adopte la pena de inhabilitación especial para la correspondiente profesión, siempre que esta exceda de tres años."], correct: 2 },
            { id: 47, text: "Conforme a la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, señale cuál de las siguientes afirmaciones no es correcta:", options: ["Para que la persona interesada pueda prolongar su permanencia en servicio activo hasta cumplir los 70 años, bastará con que lo solicite voluntariamente.", "La jubilación puede ser forzosa o voluntaria.", "La jubilación forzosa se declarará al cumplir la persona interesada 65 años.", "Podrá optar a la jubilación voluntaria, total o parcial, el personal estatutario que reúna los requisitos establecidos en la legislación de Seguridad Social."], correct: 1 },
            { id: 48, text: "Procede la extinción de la condición de personal estatutario fijo de los servicios de salud:", options: ["Cuando se produzca la pérdida de la nacionalidad.", "En caso de recaer sanción firme disciplinaria de separación del servicio.", "Siempre que se imponga una pena principal o accesoria de inhabilitación especial para empleo o cargo público o para el ejercicio de la correspondiente profesión.", "Todas las anteriores respuestas son correctas."], correct: 3 },
            { id: 49, text: "En materia de retribuciones, la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, prevé que:", options: ["El sistema retributivo del personal estatutario se estructura en retribuciones básicas y retribuciones complementarias.", "La evaluación del personal estatutario a efectos de determinación de una parte de la retribuciones complementarias se establecerá a través de procedimientos fundados en los principios igualdad, objetividad y transparencia.", "El sistema retributivo del personal estatutario responde a los principios de cualificación técnica y profesional.", "Todas las respuestas son correctas."], correct: 3 },
            { id: 50, text: "De acuerdo con la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, señale la respuesta correcta respecto a las retribuciones del personal estatutario de los servicios de salud:", options: ["Las retribuciones básicas son: el sueldo asignado a cada categoría en función del título exigido para su desempeño; los trienios; y las pagas extraordinarias.", "Las retribuciones básicas serán iguales en todos los servicios de salud independientemente de la anualidad en la que se perciban.", "El personal estatutario temporal percibirá la totalidad de las retribuciones que, en el correspondiente servicio de salud, correspondan a su nombramiento, con excepción del complemento de carrera.", "El complemento de atención continuada está destinado a retribuir la iniciativa continuada y permanente de la persona titular del puesto."], correct: 0 },
            
            // BLOQUE 2
            { id: 51, text: "La pérdida de la condición de personal estatutario de los servicios de salud se produce cuando la incapacidad permanente sea declarada:", options: ["En grado de incapacidad permanente total para la profesión habitual.", "En grado de incapacidad absoluta para todo trabajo.", "En grado de gran invalidez.", "Todas las respuestas son correctas."], correct: 3 },
            { id: 52, text: "La Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, establece que:", options: ["El tiempo de trabajo es el período en el que el personal permanece en el centro sanitario.", "Solo se considera tiempo de trabajo aquel en el que el personal se encuentre dentro del centro sanitario en su puesto de trabajo y en el ejercicio de su actividad y funciones.", "Para el cómputo del tiempo de trabajo, se puede tomar en consideración tanto el tiempo en el que se permanece en el centro sanitario como fuera de dicho centro.", "Ninguna de las respuestas anteriores es correcta."], correct: 2 },
            { id: 53, text: "En el supuesto del personal estatutario de los servicios de salud:", options: ["El período de localización es aquel período de tiempo en el que el personal se encuentra únicamente en situación de disponibilidad.", "Se considera período de descanso todo período de tiempo que no sea tiempo de trabajo.", "El trabajo por turnos es una forma de organización del trabajo en equipo con arreglo al ritmo rotatorio y siempre de tipo continuo.", "El período de localización es aquel período de tiempo en el que el personal se encuentra en situación de disponibilidad a los solos efectos de asegurar su posible localización."], correct: 1 },
            { id: 54, text: "Para el personal estatutario de los servicios de salud, el período nocturno tendrá la siguiente duración:", options: ["Mínima de siete horas e incluirá necesariamente el período comprendido entre las cero y las cinco horas de cada día natural.", "Mínima de ocho horas e incluirá necesariamente el período comprendido entre las cero y las cinco horas de cada día natural.", "Mínima de ocho horas e incluirá necesariamente el período comprendido entre las doce y las cinco horas de cada día natural.", "Mínima de siete horas e incluirá necesariamente el período comprendido entre las doce y las cinco horas de cada día natural."], correct: 0 },
            { id: 55, text: "Atendiendo a lo dispuesto en la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, señale la respuesta que no es correcta:", options: ["Para superarse la duración máxima conjunta de la jornada ordinaria y la jornada complementaria, será suficiente con justificar por parte del centro sanitario que existen razones organizativas o asistenciales que así lo justifiquen.", "Podrá superarse la duración máxima conjunta de la jornada ordinaria y de la jornada complementaria cuando el personal lo consienta y siempre que existan razones organizativas o asistenciales que así lo justifiquen en aras a garantizar la adecuada atención continuada y permanente", "Podrá superarse la duración máxima conjunta de la jornada ordinaria y de la jornada complementaria siempre previa oferta expresa del centro sanitario.", "Los excesos de jornada tendrán el carácter de jornada complementaria y un límite máximo de 150 horas anuales."], correct: 0 },
            { id: 56, text: "Respecto a la jornada y descansos diarios del personal estatutario de los servicios de salud, es correcta la siguiente afirmación:", options: ["El tiempo de trabajo correspondiente a la jornada ordinaria será siempre de 12 horas ininterrumpidas.", "El personal tiene derecho a un período mínimo de descanso ininterrumpido de 8 horas entre el fin de una jornada y el comienzo de la siguiente.", "Se podrán establecer jornadas ordinarias de hasta 24 horas con carácter excepcional y cuando así lo aconsejen razones organizativas o asistenciales.", "El descanso ininterrumpido de 12 horas entre el fin de una jornada y el comienzo de la siguiente solo podrá reducirse en el caso de trabajo a turnos, cuando el personal cambie de equipo y no pueda disfrutar del período de descanso diario entre el final de la jornada de un equipo y el comienzo de la jornada del siguiente."], correct: 2 },
            { id: 57, text: "Según establece la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud:", options: ["Resulta incompatible para el personal estatutario de los servicios de salud el ejercicio de las funciones sanitarias con cualquier otro tipo de funciones.", "Al personal estatutario de los servicios de salud le resulta aplicable el mismo régimen de incompatibilidades establecido para el personal funcionario.", "Atendiendo a lo que establezca la legislación vigente, el personal estatutario de los servicios de salud podrá compatibilizar las funciones sanitarias y docente.", "Para el personal licenciado sanitario el complemento específico resulta irrenunciable."], correct: 2 },
            { id: 58, text: "La Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud regula el descanso semanal. Señale la respuesta que no es correcta:", options: ["El personal tendrá derecho a un período mínimo que siempre será fijo de descanso ininterrumpido con una duración media de 24 horas semanales.", "El período de referencia para el cálculo del período de descanso semanal será de tres meses.", "En el caso de que no se hubiera disfrutado del tiempo mínimo de descanso semanal en el período de tres meses se producirá una compensación a través del régimen de descansos alternativos.", "El período de referencia para el cálculo del período de descanso semanal será de dos meses."], correct: 0 },
            { id: 59, text: "Conforme a la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud:", options: ["El personal tendrá derecho a una vacación retribuida cuya duración no será inferior en ningún caso a 30 días naturales.", "El personal estatutario de los servicios de salud podrá elegir sustituir el período de vacación por una compensación económica.", "Solo podrá ser sustituido por una compensación económica el período vacacional anual mediante la programación funcional de los centros, cuando así lo aconsejen razones organizativas.", "Anualmente, el personal tendrá derecho a una vacación retribuida cuya duración no será inferior a 30 días naturales, o al tiempo que proporcionalmente corresponda en función del tiempo de servicios."], correct: 3 },
            { id: 60, text: "La excedencia voluntaria solicitada por el personal estatutario de los servicios de salud por interés particular exige haber prestado servicios efectivos en cualquiera de las Administraciones públicas durante:", options: ["Los cinco años inmediatamente anteriores.", "Los cuatro años inmediatamente anteriores.", "Los dos años inmediatamente anteriores.", "Los tres años inmediatamente anteriores."], correct: 0 },
            { id: 61, text: "La Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi, establece que la Administración sanitaria vasca debe garantizar la tutela general de la salud pública a través de:", options: ["Medidas preventivas.", "Promoción de la salud.", "Prestaciones sanitarias individuales.", "Son correctas todas las respuestas."], correct: 3 },
            { id: 62, text: "La Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi, reconoce la universalidad del derecho a la protección de la salud para:", options: ["Todas las personas residentes en el territorio de Euskadi, así como para las personas transeúntes.", "Todas las personas residentes en Euskadi o fuera de Euskadi, así como para las personas transeúntes.", "Solo para las personas que tengan vecindad administrativa en Euskadi.", "Solo para las personas de quienes pueda predicarse la condición política de vascos."], correct: 0 },
            { id: 63, text: "Señale cuál de los siguientes principios no se enuncian entre los principios informadores del sistema sanitario de Euskadi en la Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi:", options: ["Universalidad.", "Solidaridad ciudadana.", "Equidad.", "Calidad de los servicios."], correct: 1 },
            { id: 64, text: "La Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi, establece respecto a las áreas de salud que:", options: ["La Comunidad Autónoma del País Vasco se divide territorialmente en áreas de salud de acuerdo con la situación socio-económica de cada demarcación geográfica.", "En cada área de salud pueden ponerse en práctica las actuaciones esenciales que requiere la tutela general de la salud pública y exclusivamente la asistencia sanitaria primaria.", "En cada área de salud se garantizará una adecuada ordenación de la atención primaria y su coordinación con la atención especializada.", "Son correctas la a) y la c)."], correct: 2 },
            { id: 65, text: "Según la Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi, señale que respuesta no es correcta. Son principios programáticos de organización y funcionamiento del sistema sanitario de Euskadi los siguientes:", options: ["La optimización del marco de cualquier tipo de financiación del catálogo de prestaciones sanitarias que asegure la Comunidad Autónoma de Euskadi.", "La orientación prioritaria de los medios y actuaciones a la promoción de la salud y a la prevención de las enfermedades.", "El desarrollo interno de la organización mediante el principio de separación de los cometidos de regulación y financiación del sistema respecto de la provisión de servicios sanitarios.", "La responsabilización y participación del personal profesional sanitario en las decisiones de organización y gestión de los recursos que tengan asignados."], correct: 0 },
            { id: 66, text: "La Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi prevé la creación de sistemas de información necesarios para facilitar el ejercicio adecuado de los distintos niveles de responsabilidad en el sistema. A tal fin, los datos de carácter personal relativos a la salud podrán ser recabados y tratados siempre que se cumplan los siguientes requisitos:", options: ["Siempre debe constar el previo consentimiento de la persona afectada.", "Si no consta el previo consentimiento de la persona afectada se requiere que la actuación se encuentre debidamente autorizada y se efectúe previo procedimiento de disociación que garantice el anonimato de la información.", "Que conste el previo consentimiento de la persona afectada por escrito y que se garantice el anonimato de la información.", "Basta con que la actuación se encuentre debidamente autorizada."], correct: 1 },
            { id: 67, text: "La Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi contempla que:", options: ["El acceso de la ciudadanía a los servicios sanitarios de cobertura pública garantizará el principio de igualdad formal.", "El acceso de la ciudadanía a cualquier servicio sanitario garantizará el principio de igualdad efectiva.", "El acceso de la ciudadanía a los servicios sanitarios de cobertura pública garantizará el principio de igualdad efectiva.", "El acceso de la ciudadanía a los servicios sanitarios garantizará el principio de universalidad."], correct: 2 },
            { id: 68, text: "La Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi al contemplar los derechos y deberes ciudadanos, alude a:", options: ["La obligación de dejar constancia escrita de todo proceso diagnóstico o terapéutico.", "La obligación de dejar constancia por cualquier medio de todo proceso diagnóstico.", "La obligación de dejar constancia por cualquier medio de todo proceso diagnóstico o terapéutico.", "No existe en la Ley ninguna previsión a este respecto, de modo que será el personal facultativo el que decida si el proceso diagnóstico o terapéutico debe quedar registrado."], correct: 2 },
            { id: 69, text: "Atendiendo a lo dispuesto en la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, señale cuál es la afirmación correcta con relación a los consejos de participación comunitaria:", options: ["Tienen facultades decisorias en la formulación de planes y objetivos generales del sistema.", "Se les atribuyen facultades consultivas y de asesoramiento en la formulación de planes y objetivos generales del sistema.", "Su composición responde exclusivamente a criterios de representatividad territorial.", "Su composición responde a criterios de representatividad territorial y podrán incorporarse, cuando así lo decida su presidencia, además de representantes de las Administraciones locales y forales, representantes de los colegios profesionales sanitarios."], correct: 1 },
            { id: 70, text: "El contrato-programa, tal y como establece la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi:", options: ["Es el instrumento jurídico mediante el que se articulan las relaciones entre el Gobierno Vasco y las organizaciones del ente público Osakidetza-Servicio Vasco de Salud para la provisión de servicios sanitarios.", "Es el instrumento juridico mediante el que se articulan de manera directa las relaciones entre el Departamento competente en materia de sanidad y las organizaciones del ente público Osakidetza-Servicio Vasco de Salud que tiene naturaleza jurídica de concierto.", "Es el instrumento jurídico mediante el que se articulan de manera directa las relaciones entre el Departamento competente en materia de sanidad y las organizaciones del ente público Osakidetza-Servicio Vasco de Salud que tiene naturaleza jurídica de un convenio de carácter especial.", "Ninguna respuesta es correcta."], correct: 0 },
            { id: 71, text: "Osakidetza-Servicio Vasco de Salud se constituye como:", options: ["Ente público con personalidad jurídica propia y adscrito al Departamento de la Administración General competente en materia de salud.", "Ente público de derecho privado con personalidad juridica propia.", "Ente público de derecho público al que se le atribuye personalidad jurídica propia.", "Ninguna respuesta es correcta."], correct: 0 },
            { id: 72, text: "El consejo de administración de Osakidetza-Servicio Vasco de Salud está integrado por:", options: ["La persona titular de la presidencia y por un número no superior a cinco miembros en representación de la Administración de la Comunidad Autónoma de Euskadi.", "La persona titular de la presidencia y por un número no superior a tres miembros en representación de la Administración de la Comunidad Autónoma de Euskadi.", "La persona titular de la presidencia y por cinco miembros en representación del Departamento competente en materia de sanidad.", "La persona titular de la presidencia, la Consejería del Departamento competente en materia de sanidad y tres miembros en representación de la Administración de la Comunidad Autónoma de Euskadi."], correct: 0 },
            { id: 73, text: "Según establece la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi:", options: ["El Plan de Salud de Euskadi debe ser aprobado por el Parlamento Vasco.", "El Departamento competente en materia de sanidad debe elaborar semestralmente y remitir al Parlamento un informe con la evaluación de los objetivos y determinaciones del Plan de Salud de Euskadi.", "El Departamento competente en materia de sanidad debe elaborar anualmente y remitir al Parlamento un informe con la evaluación de los objetivos y determinaciones del Plan de Salud de Euskadi.", "Son correctas las respuestas a) y c)."], correct: 2 },
            { id: 74, text: "A los efectos de la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, las plantillas de personal del ente público Osakidetza-Servicio Vasco de Salud:", options: ["Serán aprobadas por la Presidencia a propuesta del consejo de administración.", "Se denomina así al número de efectivos de carácter estructural con que cuentan tanto su organización central de administración como las organizaciones de servicios dependientes de Osakidetza-Servicio Vasco de Salud.", "Deberán ajustarse al número máximo de efectivos, según grupos profesionales, que anualmente aprobará su consejo de administración a propuesta del Departamento de Sanidad.", "Deberán ajustarse al número máximo de efectivos, según grupos de titulación, que anualmente aprobará el Departamento de Sanidad."], correct: 1 },
            { id: 75, text: "La dirección, planificación y programación del sistema sanitario de Euskadi es competencia:", options: ["Del Gobierno Vasco.", "Del presidente del ente público Osakidetza-Servicio Vasco de Salud a propuesta de su consejo de administración.", "Del Parlamento Vasco.", "Del Departamento competente en materia de sanidad."], correct: 3 },
            { id: 76, text: "En el ámbito territorial de la Comunidad Autónoma de Euskadi, las inspecciones necesarias para asegurar el cumplimiento de lo previsto en la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi y en el resto de la legislación sanitaria corresponde:", options: ["A la inspección de trabajo del País Vasco adscrita al Departamento de trabajo y empleo del Gobierno Vasco.", "En todos los casos a las corporaciones locales de la Comunidad Autónoma.", "Al Departamento competente en materia de sanidad.", "La inspección en materia sanitaria no es competencia de la Comunidad Autónoma de Euskadi."], correct: 2 },
            { id: 77, text: "Señale cuál de los siguientes criterios no está contemplado en la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi para la clasificación de las infracciones en leves, graves o muy graves:", options: ["La cuantía de la indemnización solicitada.", "Los riesgos para la salud.", "El grado de intencionalidad.", "La gravedad de la alteración sanitaria y social producida."], correct: 0 },
            { id: 78, text: "Según establece la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, en materia de sanciones señale la respuesta correcta:", options: ["Las infracciones serán sancionadas exclusivamente con sanción pecuniaria o económica.", "En los casos de infracciones muy graves, el Gobierno Vasco podrá acordar el cierre temporal del establecimiento, instalación o servicio por un plazo máximo de cinco años.", "Sin perjuicio de la multa que proceda imponer, en ciertos casos, la sanción económica que se imponga podrá ser incrementada hasta el triple de la cuantía del beneficio ilícito obtenido.", "En los casos de infracciones muy graves, el Gobierno Vasco podrá acordar el cierre temporal del establecimiento, instalación o servicio por un plazo máximo de tres años."], correct: 2 },
            { id: 79, text: "Según la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, las organizaciones a través de las que se procede a la provisión de servicios sanitarios con medios adscritos al ente público Osakidetza-Servicio Vasco de Salud:", options: ["Realizarán su actividad bajo el principio de autonomía económico-financiera y de gestión.", "Se configurarán como instituciones de titularidad privada y con personalidad jurídica propia.", "Se crearán por ley como entidades de titularidad pública y con personalidad jurídica propia.", "Para realizar su actividad dependen presupuestariamente del ente público Osakidetza- Servicio Vasco de Salud."], correct: 0 },
            { id: 80, text: "Respecto al personal sujeto al régimen estatutario que establece la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, señale la respuesta correcta:", options: ["Este vínculo estatutario se adquiere mediante el cumplimiento de los dos siguientes requisitos: superación del proceso selectivo correspondiente y nombramiento conferido por autoridad competente.", "Los principios que rigen el procedimiento selectivo para la adquisición del vínculo estatutario son exclusivamente el de igualdad, mérito y capacidad.", "Los instrumentos de clasificación del personal sujeto a este régimen estatutario son el grupo de titulación, el grupo profesional, la categoría y el puesto funcional que se desempeñe.", "El grupo de titulación constituye el instrumento de clasificación del personal en base al agrupamiento unitario de las aptitudes profesionales y contenido específico da las tareas propias de la prestación."], correct: 2 },
            { id: 81, text: "El ente público Osakidetza-Servicio Vasco de Salud es:", options: ["El Ente Institucional de la Comunidad Autónoma, de naturaleza pública y bajo la calificación de ente público de derecho privado o público.", "El Ente Institucional de la Comunidad Autónoma, de naturaleza pública y bajo la calificación de ente público de derecho público", "El Ente Institucional de la Comunidad Autónoma, de naturaleza pública y bajo la calificación de ente público de derecho privado", "Las tres anteriores son erróneas"], correct: 1 },
            { id: 82, text: "En desarrollo de su objeto, el ente público Osakidetza-Servicio Vasco de Salud perseguirá a través de todas sus organizaciones los siguientes fines (señálese la respuesta incorrecta):", options: ["Ejecutar la provisión del servicio público sanitario en la Comunidad Autónoma de Euskadi.", "Promocionar el desarrollo de sus recursos sanitarios a través de acciones y programas propios o en colaboración con otras instituciones, y cualquier otro fin relacionado con su objeto que decida su Dirección General.", "Promover la formación y actualización de los conocimientos especializados que requiere su personal sanitario y no sanitario, tanto en el campo específico de la salud como en los de la gestión y administración sanitarias.", "Proporcionar a las personas que accedan a sus servicios las condiciones necesarias para el pleno ejercicio de sus derechos y deberes de carácter instrumental o complementario."], correct: 1 },
            { id: 83, text: "Corresponderá la presidencia del ente público Osakidetza-Servicio Vasco de Salud a:", options: ["Quien ostente la presidencia del Gobierno (Lehendakari) de la Comunidad Autónoma del País Vasco.", "La Diputación General del Territorio Histórico en que esté situado el Ente.", "La presidencia a quien ostente la titularidad del Departamento de Sanidad y la presidencia de honor a quien ostente la presidencia del Gobierno (Lehendakari) de la Comunidad Autónoma del País Vasco.", "Quien ostente la titularidad de del Departamento de Sanidad."], correct: 3 },
            { id: 84, text: "La función de nombrar y separar a quienes ocupen las Direcciones de División de la organización central del ente público Osakidetza-Servicio Vasco de Salud corresponde a:", options: ["El Consejo de Administración del Ente.", "La Dirección General del Ente.", "La Presidencia del Ente.", "Ninguno de los anteriores."], correct: 0 },
            { id: 85, text: "La composición del Consejo del ente público Osakidetza-Servicio Vasco de Salud contará, además de la persona que ejerza la Presidencia:", options: ["Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: una persona a propuesta de la titularidad del Departamento de Hacienda y Administración Pública, otra a propuesta de quien ostente la titularidad de Bienestar Social y las tres restantes a propuesta de la persona titular de Sanidad.", "Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: una persona a propuesta de la titularidad del Departamento de Hacienda y Administración Pública, otra a propuesta de la persona titular de la Consejería de Presidencia y las tres restantes a propuesta de la persona titular de Sanidad.", "Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: dos a propuesta de la persona titular del Departamento de Hacienda y Administración Pública y las tres restantes a propuesta de la persona titular de Sanidad.", "Ninguna de los anteriores."], correct: 0 },
            { id: 86, text: "La función de aprobar los criterios y líneas generales de actuación del ente público Osakidetza-Servicio Vasco de Salud corresponde a:", options: ["El Consejo de Administración del Ente.", "La Dirección General del Ente.", "La Presidencia del Ente.", "Ninguno de los anteriores."], correct: 0 },
            { id: 87, text: "La propuesta de Plan Estratégico del ente público Osakidetza-Servicio Vasco de Salud:", options: ["Será formulada por la Dirección General del Ente.", "Será aprobada por la Presidencia del Ente.", "Será sometida a informe del Consejo de Administración del Ente.", "Todas las anteriores son ciertas."], correct: 3 },
            { id: 88, text: "La función de convocar, presidir, suspender y levantar las sesiones, arbitrar las deliberaciones del Consejo de Administración del ente público Osakidetza- Servicio vasco de salud y decidir los empates con su voto de calidad corresponderá a:", options: ["La Dirección General.", "La Presidencia.", "La persona de mayor antigüedad del Consejo de Administración.", "Ninguna de las anteriores."], correct: 1 },
            { id: 89, text: "De acuerdo con el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del ente público Osakidetza-Servicio Vasco de Salud, para el desarrollo de sus funciones, la Dirección General del ente público Osakidetza-Servicio Vasco de Salud contará con el apoyo de un equipo directivo formado por:", options: ["Dos Direcciones de División.", "Tres Direcciones de División.", "Cuatro Direcciones de División.", "La norma no establece el número concreto de Direcciones de División."], correct: 1 },
            { id: 90, text: "La persona titular de la Dirección General del ente público Osakidetza- Servicio Vasco de Salud:", options: ["No podrá asistir a las reuniones del Consejo de Administración del Ente.", "Presidirá las reuniones del Consejo de Administración del Ente.", "Asistirá a las reuniones del Consejo de Administración del Ente con voz y voto.", "Asistirá a las reuniones del Consejo de Administración del Ente con voz y sin voto."], correct: 3 },
            { id: 91, text: "Corresponde a la organización central de administración y gestión corporativa del ente público Osakidetza-Servicio Vasco de Salud, en materia de gestión asistencial (señálese la respuesta incorrecta):", options: ["Supervisar el cumplimiento de las políticas generales de calidad y realizar auditorías.", "Definir criterios generales y proponer la política de precios correspondiente a la prestación de servicios sanitarios incluida en la cobertura pública.", "Coordinar los recursos y, en su caso, proponer medidas de intervención sobre las listas de espera.", "Promover protocolos de interés general."], correct: 1 },
            { id: 92, text: "Corresponde a la organización central de administración y gestión corporativa del ente público Osakidetza-Servicio Vasco de Salud, en materia de gestión de recursos humanos (señálese la respuesta incorrecta):", options: ["Supervisar, controlar y evaluar las políticas de personal del Ente.", "Promover acuerdos de cooperación con centros correspondientes a la sanidad privada.", "Dirigir el funcionamiento del registro de personal.", "Gestionar los procesos de selección y de provisión que el Consejo de Administración determine, por su carácter general, previsible número de aspirantes u otras circunstancias análogas, y, a tal fin, convocarlos, establecer sus bases, programas y contenidos, y designar a los tribunales calificadores de los mismos."], correct: 1 },
            { id: 93, text: "De acuerdo con lo que señala el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del ente público Osakidetza-Servicio Vasco de Salud, cada organización de servicios sanitarios dependiente del ente público tendrá definido su objeto de actividad o ámbito de actuación sanitaria de conformidad con lo dispuesto específicamente en la:", options: ["Ley 41/2002 de Autonomía del Paciente.", "Ley 8/1997, de 26 de junio, de Ordenación sanitaria de Euskadi.", "Decreto 17/2022, de 1 de febrero, del Registro Vasco de Profesionales del ámbito sanitario.", "Ninguna de las anteriores."], correct: 1 },
            { id: 94, text: "Corresponde a cada organización de servicios sanitarios del ente público Osakidetza-Servicio Vasco de Salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios sanitarios que tengan encomendada, quedando excluidas únicamente:", options: ["Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza-Servicio Vasco de Salud atribuyen expresamente a la organización central del Ente Público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.", "Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza-Servicio Vasco de Salud atribuyen expresamente a la Presidencia del ente público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.", "Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza-Servicio Vasco de Salud atribuyen expresamente al Consejo de Administración del ente público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.", "Ninguna de las anteriores."], correct: 0 },
            { id: 95, text: "El número de integrantes del equipo directivo de las organizaciones de servicios sanitarios del ente público Osakidetza-Servicio Vasco de Salud:", options: ["Oscilará entre dos y tres.", "Oscilará entre tres y cuatro.", "Oscilará entre cuatro y cinco.", "La normativa que rige su estatuto jurídico no establece un número determinado sino un máximo de cinco."], correct: 3 },
            { id: 96, text: "La función de Representar al ente público Osakidetza-Servicio Vasco de Salud en la negociación colectiva del Acuerdo Marco de Condiciones de Trabajo del Personal corresponde a:", options: ["La organización central de administración y gestión corporativa del ente público Osakidetza-Servicio Vasco de Salud.", "La Presidencia del ente público Osakidetza-Servicio Vasco de Salud.", "El Consejo de Administración del ente público Osakidetza-Servicio Vasco de Salud.", "Ninguna de las anteriores."], correct: 0 },
            { id: 97, text: "Para el desarrollo de funciones de propuesta y asesoramiento, así como de participación en las organizaciones de servicios sanitarios, existirá un Consejo de Dirección en cada una de ellas, integrado por:", options: ["El equipo directivo, las jefaturas de unidad que se determinen y una representación de personas vocales electas que formen parte de los Consejos Técnicos de participación profesional respectivos.", "El equipo directivo, las jefaturas de unidad que se determinen, representantes sindicales y una representación de personas vocales electas que formen parte de los Consejos Técnicos de participación profesional respectivos.", "El equipo directivo y las jefaturas de unidad que se determinen.", "Todas las anteriores son falsas."], correct: 0 },
            { id: 98, text: "Las organizaciones de servicios sanitarios del ente público Osakidetza-Servicio Vasco de Salud podrán:", options: ["Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión, aunque solo en materia de personal y siempre de acuerdo con el marco estratégico, los planes de gestión y el compromiso del contrato-programa suscrito por la organización.", "Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión, pero solo en materia económica y siempre de acuerdo con el marco estratégico, los planes de gestión y el compromiso del contrato-programa suscrito por la organización.", "Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión tanto en materia económica como de personal, de acuerdo con el marco estratégico, los planes de gestión y el compromiso del contrato-programa suscrito por la organización.", "Todas las anteriores son falsas."], correct: 2 },
            { id: 99, text: "En materia específica de inversiones, la competencia para ejecutar las compras de suministros que se consideren centralizadas, así como definir y/o ejecutar, en su caso, las consideradas integradas corresponde a:", options: ["El Consejo de Administración del ente público Osakidetza-Servicio Vasco de Salud.", "La organización central de administración y gestión corporativa del ente público Osakidetza-Servicio Vasco de Salud.", "La organización de servicios del ente público Osakidetza-Servicio Vasco de Salud.", "A quien ostente la titularidad de la Dirección-Gerencia de cada organización de servicios sanitarios del Osakidetza-Servicio Vasco de Salud."], correct: 1 },
            { id: 100, text: "En el ámbito de una organización de servicios sanitarios del ente público Osakidetza-Servicio Vasco de Salud, presidir los Consejos Técnicos de participación profesional y promover su eficaz funcionamiento es una tarea que corresponde a:", options: ["La Dirección General del Ente.", "Quien ostente la titularidad de la Dirección-Gerencia del Ente.", "La Dirección Médica del Ente.", "Ninguna de las anteriores."], correct: 1 },
            { id: 101, text: "El Decreto 100/2018, de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio vasco de salud, se aprobó el:", options: ["3 de mayo de 2018.", "13 de junio de 2018.", "3 de julio de 2018.", "13 de julio de 2018."], correct: 2 },
            { id: 102, text: "Una Organización Sanitaria Integrada (OSI) es:", options: ["Una organización que agrupa a todos los centros de salud de una comarca.", "Una organización que agrupa a todos los hospitales de un territorio histórico.", "Una organización que gestiona exclusivamente la atención sociosanitaria.", "Una organización que integra funcional y organizativamente la atención primaria y la atención hospitalaria de un área de salud específica."], correct: 3 },
            { id: 103, text: "El modelo de Organización Sanitaria Integrada persigue:", options: ["La separación estricta de la atención primaria y la atención especializada para una mejor gestión presupuestaria.", "La integración clínica y asistencial centrada en las necesidades de la persona paciente, superando la fragmentación asistencial.", "La centralización de todos los servicios en el hospital de referencia.", "La privatización de los servicios de soporte no clínicos."], correct: 1 },
            { id: 104, text: "De acuerdo con el Decreto 100/2018, las OSI realizan su actividad bajo el principio de:", options: ["Dependencia jerárquica directa del Departamento de Salud para la toma de decisiones clínicas.", "Autonomía exclusiva en materia de recursos humanos, pero no financiera.", "Autonomía económico-financiera y de gestión.", "Gestión centralizada desde la Dirección General de Osakidetza para todas sus compras."], correct: 2 },
            { id: 105, text: "Según el Decreto 100/2018, se considera OSI Monográfica a aquella que:", options: ["Se dedica exclusivamente a la atención de personas mayores.", "Desarrolla su actividad asistencial fundamentalmente en torno a un ámbito específico o a una patología concreta.", "Atiende a una población inferior a 50.000 habitantes.", "Solo cuenta con centros de salud de atención primaria."], correct: 1 },
            { id: 106, text: "Las OSI se clasifican en diferentes tipos. ¿Cuál corresponde a la organización que dispone de hospital de referencia de mayor nivel de complejidad, universitario y que ejerce como servicio de referencia para otras OSI?", options: ["OSI Tipo III.", "OSI Tipo II.", "OSI Tipo I.", "OSI Monográfica."], correct: 2 },
            { id: 107, text: "Una OSI Tipo III se caracteriza, entre otras cosas, por:", options: ["Tener un hospital de nivel terciario.", "Atender a una población superior a 400.000 habitantes.", "Disponer de un hospital de base poblacional inferior a 300.000 habitantes, con cartera de servicios de nivel primario y secundario.", "No disponer de atención especializada."], correct: 2 },
            { id: 108, text: "Son órganos de participación de las OSI:", options: ["El Consejo de Dirección y el Equipo Directivo.", "El Consejo Clínico Asistencial, el Consejo Social y, en su caso, la Comisión Sociosanitaria.", "La Dirección Gerencia y la Dirección Médica.", "El Consejo de Administración de Osakidetza y el Departamento de Salud."], correct: 1 },
            { id: 109, text: "El equipo directivo de una OSI Tipo I o Tipo II estará compuesto, además de por la Dirección Gerencia, por las siguientes direcciones:", options: ["Médica, de Enfermería y Económica.", "Médica, de Atención Integrada, de Enfermería, de Personas y Económico-Financiera o de Gestión.", "Solo Dirección Médica y Dirección de Enfermería.", "Médica, de Atención Integrada, de Calidad y Económico-Financiera."], correct: 1 },
